<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Metadata & Analytics</title>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-body: #0f172a;
            --bg-panel: #1e293b;
            --bg-card: #334155;
            --primary: #8b5cf6;
            --primary-hover: #7c3aed;
            --primary-glow: rgba(139, 92, 246, 0.5);
            --accent: #06b6d4;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: 1px solid rgba(255, 255, 255, 0.1);
            --success: #10b981;
        }

        * { box-sizing: border-box; outline: none; }
        html, body { margin: 0; padding: 0; font-family: 'Outfit', sans-serif; background-color: var(--bg-body); color: var(--text-main); height: 100vh; width: 100vw; }
        #root { width: 100%; height: 100%; }

        .app-container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        .sidebar {
            width: 280px;
            background: var(--bg-panel);
            border-right: var(--border);
            display: flex;
            flex-direction: column;
            padding: 25px;
            flex-shrink: 0;
            height: 100%;
            overflow-y: auto;
        }

        .brand {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(to right, var(--primary), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 40px;
            flex-shrink: 0;
        }

        .nav-item {
            padding: 12px 16px;
            margin-bottom: 8px;
            border-radius: 12px;
            color: var(--text-muted);
            cursor: pointer;
            font-weight: 500;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .nav-item:hover { background: rgba(255, 255, 255, 0.05); color: white; }
        .nav-item.active { background: var(--primary); color: white; box-shadow: 0 4px 15px var(--primary-glow); }

        .session-card {
            margin-top: auto;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            border: var(--border);
        }

        .logout-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
            width: 100%;
        }

        .logout-btn:hover { background: #dc2626; }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.5), rgba(15, 23, 42, 0.8));
            overflow-y: auto;
        }

        .header {
            padding: 30px;
            border-bottom: var(--border);
        }

        .header h2 {
            margin: 0 0 10px 0;
            font-size: 2rem;
        }

        .header > div {
            font-size: 0.95rem;
        }

        .content-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
        }

        /* Metadata Cards */
        .metadata-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .metadata-card {
            background: var(--bg-card);
            border: var(--border);
            border-radius: 16px;
            padding: 20px;
            transition: 0.3s;
        }

        .metadata-card:hover {
            border-color: var(--primary);
            box-shadow: 0 8px 32px var(--primary-glow);
            transform: translateY(-4px);
        }

        .metadata-card .label {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .metadata-card .value {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(to right, var(--primary), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .metadata-card .subtext {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 8px;
        }

        .metadata-card .icon {
            font-size: 2rem;
            margin-bottom: 15px;
        }

        /* Document Metadata Table */
        .metadata-section {
            background: var(--bg-card);
            border: var(--border);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 30px;
        }

        .metadata-section h3 {
            margin: 0 0 20px 0;
            font-size: 1.3rem;
        }

        .metadata-table {
            width: 100%;
            border-collapse: collapse;
        }

        .metadata-table thead {
            background: rgba(255, 255, 255, 0.05);
        }

        .metadata-table th {
            padding: 15px;
            text-align: left;
            font-weight: 600;
            color: var(--accent);
            font-size: 0.9rem;
            text-transform: uppercase;
            border-bottom: 2px solid rgba(139, 92, 246, 0.3);
        }

        .metadata-table td {
            padding: 15px;
            border-bottom: var(--border);
            font-size: 0.9rem;
        }

        .metadata-table tbody tr:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .badge-primary { background: rgba(139, 92, 246, 0.2); color: var(--primary); }
        .badge-accent { background: rgba(6, 182, 212, 0.2); color: var(--accent); }
        .badge-success { background: rgba(16, 185, 129, 0.2); color: var(--success); }

        /* Project Metadata */
        .project-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .info-box {
            background: rgba(139, 92, 246, 0.1);
            border: 1px solid var(--primary);
            border-radius: 12px;
            padding: 20px;
        }

        .info-box h4 {
            margin: 0 0 10px 0;
            color: var(--accent);
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        .info-box p {
            margin: 5px 0;
            color: var(--text-main);
            font-size: 0.95rem;
        }

        .info-box code {
            background: rgba(0, 0, 0, 0.3);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.85rem;
        }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-item {
            background: var(--bg-card);
            border: var(--border);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
        }

        .stat-item .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent);
        }

        .stat-item .stat-label {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-top: 5px;
        }

        .no-data {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }

        @media (max-width: 768px) {
            .sidebar { width: 0; }
            .metadata-grid { grid-template-columns: 1fr; }
            .header { padding: 20px; }
            .content-scroll { padding: 20px; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const API_BASE = 'http://localhost:5000/api';

        const getToken = () => localStorage.getItem('token');

        const App = () => {
            const [user, setUser] = useState("Student");
            const [documents, setDocuments] = useState([]);
            const [stats, setStats] = useState({});
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const savedUser = localStorage.getItem('user');
                if (savedUser) setUser(savedUser);
                fetchMetadata();
            }, []);

            const fetchMetadata = async () => {
                try {
                    const response = await fetch(`${API_BASE}/documents`, {
                        headers: { Authorization: `Bearer ${getToken()}` }
                    });
                    const data = await response.json();
                    setDocuments(data);

                    // Calculate statistics
                    if (data.length > 0) {
                        const totalDownloads = data.reduce((sum, doc) => sum + (doc.downloads || 0), 0);
                        const totalSize = data.reduce((sum, doc) => sum + (doc.fileSize || 0), 0);
                        const avgFileSize = Math.round(totalSize / data.length);
                        const mostDownloaded = data.reduce((max, doc) => 
                            (doc.downloads > (max.downloads || 0) ? doc : max), {});
                        
                        const typeCount = {};
                        data.forEach(doc => {
                            typeCount[doc.type] = (typeCount[doc.type] || 0) + 1;
                        });

                        setStats({
                            totalDocuments: data.length,
                            totalDownloads,
                            totalSize,
                            avgFileSize,
                            mostDownloaded,
                            typeDistribution: typeCount
                        });
                    }

                    setLoading(false);
                } catch (error) {
                    console.error('Error fetching metadata:', error);
                    setLoading(false);
                }
            };

            const formatFileSize = (bytes) => {
                if (!bytes) return '0 B';
                const sizes = ['B', 'KB', 'MB', 'GB'];
                const i = Math.floor(Math.log(bytes) / Math.log(1024));
                return Math.round((bytes / Math.pow(1024, i)) * 100) / 100 + ' ' + sizes[i];
            };

            const formatDate = (date) => {
                return new Date(date).toLocaleDateString('en-US', {
                    year: 'numeric',
                    month: 'short',
                    day: 'numeric'
                });
            };

            const handleLogout = () => {
                localStorage.clear();
                sessionStorage.clear();
                window.location.href = 'auth.html';
            };

            return (
                <div className="app-container">
                    {/* SIDEBAR */}
                    <div className="sidebar">
                        <div className="brand">🎓 StudentHub</div>
                        <nav>
                            <a href="dashboard.html" className="nav-item">📊 Dashboard</a>
                            <a href="resources.html" className="nav-item">📚 Resources</a>
                            <a href="learning_hub.html" className="nav-item">🎯 Learning Hub</a>
                            <a href="chat.html" className="nav-item">💬 Chat</a>
                            <a href="feedback.html" className="nav-item">⭐ Feedback</a>
                            <a href="profile.html" className="nav-item">👤 Profile</a>
                            <a href="metadata.html" className="nav-item active">📊 Metadata</a>
                        </nav>
                        <div className="session-card">
                            <small style={{color: 'var(--accent)'}}>Logged in as</small>
                            <div style={{fontSize: '0.95rem', fontWeight: 'bold', marginBottom: '15px'}}>{user}</div>
                            <button className="logout-btn" onClick={handleLogout}>Logout</button>
                        </div>
                    </div>

                    {/* MAIN CONTENT */}
                    <div className="main-content">
                        <div className="header">
                            <h2>📊 Project Metadata & Analytics</h2>
                            <div>Comprehensive data about your documents and project statistics</div>
                        </div>

                        <div className="content-scroll">
                            
                            {/* PROJECT METADATA */}
                            <div className="metadata-section">
                                <h3>📋 Project Information</h3>
                                <div className="project-info">
                                    <div className="info-box">
                                        <h4>Project Name</h4>
                                        <p>StudentHub - Document Management System</p>
                                    </div>
                                    <div className="info-box">
                                        <h4>Version</h4>
                                        <p><code>v1.0.0</code></p>
                                    </div>
                                    <div className="info-box">
                                        <h4>Created</h4>
                                        <p>December 2024</p>
                                    </div>
                                    <div className="info-box">
                                        <h4>Tech Stack</h4>
                                        <p>MERN (MongoDB, Express, React, Node.js)</p>
                                    </div>
                                    <div className="info-box">
                                        <h4>Database</h4>
                                        <p>MongoDB</p>
                                    </div>
                                    <div className="info-box">
                                        <h4>Real-time</h4>
                                        <p>Socket.IO Enabled</p>
                                    </div>
                                </div>
                            </div>

                            {/* OVERALL STATISTICS */}
                            <div className="metadata-section">
                                <h3>📈 Overall Statistics</h3>
                                <div className="metadata-grid">
                                    <div className="metadata-card">
                                        <div className="icon">📄</div>
                                        <div className="label">Total Documents</div>
                                        <div className="value">{stats.totalDocuments || 0}</div>
                                        <div className="subtext">Across all users</div>
                                    </div>

                                    <div className="metadata-card">
                                        <div className="icon">⬇️</div>
                                        <div className="label">Total Downloads</div>
                                        <div className="value">{stats.totalDownloads || 0}</div>
                                        <div className="subtext">All documents combined</div>
                                    </div>

                                    <div className="metadata-card">
                                        <div className="icon">💾</div>
                                        <div className="label">Total Storage</div>
                                        <div className="value">{formatFileSize(stats.totalSize)}</div>
                                        <div className="subtext">All files combined</div>
                                    </div>

                                    <div className="metadata-card">
                                        <div className="icon">📏</div>
                                        <div className="label">Avg. File Size</div>
                                        <div className="value">{formatFileSize(stats.avgFileSize)}</div>
                                        <div className="subtext">Average per document</div>
                                    </div>
                                </div>
                            </div>

                            {/* DOCUMENT TYPE DISTRIBUTION */}
                            {stats.typeDistribution && Object.keys(stats.typeDistribution).length > 0 && (
                                <div className="metadata-section">
                                    <h3>📂 Document Type Distribution</h3>
                                    <div className="stats-row">
                                        {Object.entries(stats.typeDistribution).map(([type, count]) => (
                                            <div className="stat-item" key={type}>
                                                <div className="stat-value">{count}</div>
                                                <div className="stat-label">{type}</div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* MOST DOWNLOADED */}
                            {stats.mostDownloaded && stats.mostDownloaded.name && (
                                <div className="metadata-section">
                                    <h3>⭐ Most Downloaded Document</h3>
                                    <div className="stats-row">
                                        <div className="stat-item">
                                            <div style={{color: 'var(--accent)', marginBottom: '10px'}}>{stats.mostDownloaded.name}</div>
                                            <div className="stat-value">{stats.mostDownloaded.downloads}</div>
                                            <div className="stat-label">Downloads</div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* DETAILED DOCUMENT METADATA TABLE */}
                            {!loading && documents.length > 0 && (
                                <div className="metadata-section">
                                    <h3>📑 Detailed Document Metadata</h3>
                                    <div style={{overflowX: 'auto'}}>
                                        <table className="metadata-table">
                                            <thead>
                                                <tr>
                                                    <th>Document Name</th>
                                                    <th>Type</th>
                                                    <th>Subject</th>
                                                    <th>File Size</th>
                                                    <th>Downloads</th>
                                                    <th>Uploaded By</th>
                                                    <th>Date</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {documents.map(doc => (
                                                    <tr key={doc._id}>
                                                        <td style={{fontWeight: '500'}}>{doc.name}</td>
                                                        <td><span className="badge badge-primary">{doc.type}</span></td>
                                                        <td><span className="badge badge-accent">{doc.subject}</span></td>
                                                        <td>{formatFileSize(doc.fileSize)}</td>
                                                        <td><strong>{doc.downloads || 0}</strong></td>
                                                        <td>{doc.uploaderName}</td>
                                                        <td>{formatDate(doc.uploadedAt)}</td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}

                            {loading && (
                                <div className="no-data">
                                    <p>Loading metadata...</p>
                                </div>
                            )}

                        </div>
                    </div>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
