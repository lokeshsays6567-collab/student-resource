<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Chat - Luminous Pro</title>
    
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --primary-gradient: linear-gradient(135deg, #4f46e5 0%, #9333ea 100%);
            --accent-color: #06b6d4;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --bg-body: #0f172a;
        }

        * { box-sizing: border-box; outline: none; }

        body {
            margin: 0; padding: 0;
            font-family: 'Inter', sans-serif;
            height: 100vh; width: 100vw;
            background: var(--bg-body);
            color: var(--text-main);
            overflow: hidden;
        }

        .app-container {
            display: flex;
            width: 100vw; height: 100vh;
            background: radial-gradient(circle at top right, #1e1b4b, transparent);
            backdrop-filter: blur(30px);
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 325px;
            background: linear-gradient(180deg, #111827 0%, #111827 100%);
            border-right: 1px solid rgba(255,255,255,0.08);
            display: flex; flex-direction: column;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 20px 18px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            color: #e2e8f0;
            font-weight: 700;
        }

        .group-panel-title {
            padding: 16px 18px 8px;
            color: #e2e8f0;
            font-size: 0.95rem;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            opacity: 0.85;
        }

        .group-list {
            padding: 5px 8px 10px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            overflow-y: auto;
            max-height: 180px;
        }

        .group-list-item {
            border-radius: 10px;
            padding: 9px 11px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .group-list-item:hover {
            background: rgba(99,102,241,0.2);
            border-color: rgba(99,102,241,0.45);
        }

        .group-list-item.active {
            background: #1d4ed8;
            border-color: #1d4ed8;
            color: white;
        }

        .group-list-item span { font-size: 0.9rem; font-weight: 500; }

        .group-cards {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 8px 10px 10px;
            max-height: 212px;
            overflow-y: auto;
        }

        .group-card {
            border-radius: 12px;
            background: linear-gradient(132deg, rgba(15, 23, 42, 0.9), rgba(30, 41, 59, 0.85));
            border: 1px solid rgba(139, 92, 246, 0.35);
            padding: 11px 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .group-card.active,
        .group-card:hover {
            border-color: #6366f1;
            box-shadow: 0 0 0 1px rgba(99,102,241,0.22), 0 8px 20px rgba(0,0,0,0.25);
            background: rgba(59, 130, 246, 0.2);
        }

        .group-card-title {
            font-size: 1.12rem;
            font-weight: 700;
            color: #f8fafc;
        }

        .group-card-sub {
            color: #cbd5e1;
            font-size: 0.82rem;
        }

        .group-card-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.73rem;
            color: #94a3b8;
        }

        .chat-area { flex: 1; display: flex; flex-direction: column; background: #0b1224; }

        .chat-header { height: 70px; padding: 0 24px; display: flex; align-items: center; background: #111827; border-bottom: 1px solid rgba(255,255,255,0.08); }

        .chat-header h2 { margin: 0; font-size: 1.25rem; letter-spacing: 0.1px; }

        .chat-body { display: flex; flex-direction: column; flex: 1; background: #0f172a; }

        .messages-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: linear-gradient(180deg, rgba(15,23,42,.95), rgba(15,23,42,.95)); }

        .message { max-width: 70%; display: flex; flex-direction: column; animation: fadeIn 0.2s ease-out; }
        .message.sent { align-self: flex-end; align-items: flex-end; }
        .message.received { align-self: flex-start; }

        .msg-bubble {
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 0.9rem;
            line-height: 1.35;
            box-shadow: 0 8px 20px rgba(0,0,0,0.25);
            border: 1px solid rgba(255,255,255,0.06);
            max-width: 100%;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .message.sent .msg-bubble { background: #2563eb; color: white; border-bottom-right-radius: 4px; }
        .message.received .msg-bubble { background: #e2e8f0; color: #0f172a; border-bottom-left-radius: 4px; }

        .chat-footer { border-top: 1px solid rgba(255,255,255,0.08); background: #111827; padding: 12px 16px; display: flex; align-items: center; gap: 8px; }

        .chat-input { flex: 1; background: #1f2937; border: 1px solid rgba(255,255,255,0.06); padding: 10px 12px; border-radius: 10px; color: #e2e8f0; }

        .icon-btn-circle { width: 40px; height: 40px; border-radius: 10px; border: none; cursor: pointer; background: #2563eb; color: white; display: flex; align-items: center; justify-content: center; }

        .section-label { margin: 12px 16px 4px; color: #cbd5e1; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.8px; }

        .brand {
            font-size: 1.4rem; font-weight: 700;
            background: linear-gradient(to right, #8b5cf6, #06b6d4);
            -webkit-background-clip: text; background-clip: text; color: transparent;
        }

        .user-profile {
            padding: 15px 25px; display: flex; align-items: center; gap: 12px;
            border-bottom: 1px solid var(--glass-border);
        }

        .user-avatar {
            width: 40px; height: 40px; border-radius: 10px;
            background: var(--primary-gradient);
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; box-shadow: 0 4px 15px rgba(79, 70, 229, 0.4);
        }

        .nav-item {
            padding: 14px 20px; color: var(--text-muted); cursor: pointer;
            transition: 0.3s; display: flex; align-items: center; gap: 12px;
            text-decoration: none; font-size: 1.05rem;
            font-weight: 500;
        }
        .nav-item:hover { background: rgba(255,255,255,0.08); color: #06b6d4; }
        .nav-item.active { background: #8b5cf6; color: white; }

        .nav-section {
            max-height: 200px;
            overflow-y: auto;
            padding: 10px 0;
            scrollbar-width: thin;
            scrollbar-color: #8b5cf6 rgba(139, 92, 246, 0.15);
            border-bottom: 1px solid var(--glass-border);
        }

        .nav-section::-webkit-scrollbar {
            width: 12px;
        }

        .nav-section::-webkit-scrollbar-track {
            background: rgba(139, 92, 246, 0.1);
        }

        .nav-section::-webkit-scrollbar-thumb {
            background: #8b5cf6;
            border-radius: 6px;
            transition: 0.2s;
        }

        .nav-section::-webkit-scrollbar-thumb:hover {
            background: #7c3aed;
            box-shadow: 0 0 6px rgba(139, 92, 246, 0.4);
        }

        /* --- CHAT LIST --- */
        .chat-list { 
            flex: 1; 
            overflow-y: auto; 
            padding: px; 
            scrollbar-width: thick;
            scrollbar-color: #8b5cf6 rgba(139, 92, 246, 0.2);
            background: linear-gradient(to bottom, rgba(139, 92, 246, 0.02), rgba(6, 182, 212, 0.02));
        }

        .chat-list::-webkit-scrollbar {
            width: 70px;
        }

        .chat-list::-webkit-scrollbar-track {
            background: rgba(139, 92, 246, 0.15);
            border-radius: 10px;
            margin: 5px;
        }

        .chat-list::-webkit-scrollbar-thumb {
            background: linear-gradient(to bottom, #8b5cf6, #06b6d4);
            border-radius: 10px;
            transition: 0.2s;
            border: 2px solid rgba(139, 92, 246, 0.1);
        }

        .chat-list::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(to bottom, #7c3aed, #0891b2);
            box-shadow: 0 0 8px rgba(139, 92, 246, 0.5);
            border: 2px solid rgba(139, 92, 246, 0.3);
        }

        .chat-item {
            padding: 20px 20px; 
            display: flex; 
            align-items: center; 
            gap: 18px;
            border-radius: 14px; 
            cursor: pointer; 
            transition: all 0.3s ease; 
            margin-bottom: 14px;
            position: relative;
            background: linear-gradient(135deg, rgba(255,255,255,0), rgba(139, 92, 246, 0));
            border: 1px solid transparent;
            min-height: 130px;
        }
        .chat-item:hover { 
            background: linear-gradient(135deg, rgba(255,255,255,0.08), rgba(139, 92, 246, 0.15));
            transform: translateX(10px);
            border-left: 4px solid #8b5cf6;
            border: 1px solid rgba(139, 92, 246, 0.3);
            padding-left: 14px;
            box-shadow: 0 6px 20px rgba(139, 92, 246, 0.25);
        }
        .chat-item.active { 
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
            color: white;
            box-shadow: 0 10px 40px rgba(139, 92, 246, 0.5);
            border: 1px solid rgba(139, 92, 246, 0.5);
        }

        .item-avatar { 
            width: 85px; 
            height: 85px; 
            border-radius: 12px; 
            background: rgba(255,255,255,0.05); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 2.2rem;
            flex-shrink: 0;
        }

        .item-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-width: 0;
        }

        .item-name {
            font-weight: 700;
            color: white;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 1.35rem;
            line-height: 1.4;
        }

        .item-preview {
            font-size: 1.05rem;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.3;
        }

        .chat-item.active .item-name {
            color: white;
        }

        .chat-item.active .item-preview {
            color: rgba(255, 255, 255, 0.8);
        }

        /* --- MAIN AREA --- */
        .chat-area { flex: 1; display: flex; flex-direction: column; background: rgba(15, 23, 42, 0.3); }

        .chat-header {
            height: 80px; padding: 0 30px; display: flex;
            justify-content: space-between; align-items: center;
            background: rgba(30, 41, 59, 0.5); border-bottom: 1px solid var(--glass-border);
        }

        .messages-box { flex: 1; padding: 30px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }

        .message { max-width: 65%; display: flex; flex-direction: column; }
        .message.sent { align-self: flex-end; align-items: flex-end; }
        .message.received { align-self: flex-start; }

        .msg-bubble { 
            padding: 12px 18px; border-radius: 18px; font-size: 0.95rem; line-height: 1.5;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            animation: fadeIn 0.3s ease-out;
        }
        .message.sent .msg-bubble { background: var(--primary-gradient); color: white; border-bottom-right-radius: 4px; }
        .message.received .msg-bubble { background: #1e293b; color: var(--text-main); border-bottom-left-radius: 4px; border: 1px solid var(--glass-border); }

        .msg-time {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 4px;
            display: block;
        }

        .file-link {
            display: flex; align-items: center; gap: 10px; margin-top: 8px; padding: 10px;
            background: rgba(0,0,0,0.2); border-radius: 10px; text-decoration: none; color: #06b6d4; font-size: 0.85rem;
            transition: 0.2s;
        }
        .file-link:hover {
            background: rgba(6, 182, 212, 0.2);
            color: #22d3ee;
        }

        .preview-file-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: 0.2s;
        }
        .preview-file-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 18px;
            background: #1e293b;
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            border: 1px solid var(--glass-border);
            width: fit-content;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-muted);
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                transform: translateY(0);
                opacity: 0.7;
            }
            30% {
                transform: translateY(-10px);
                opacity: 1;
            }
        }

        .chat-input { 
            flex: 1; background: #0f172a; border: 1px solid var(--glass-border); 
            padding: 12px 20px; border-radius: 12px; color: white;
        }

        .icon-btn-circle {
            width: 45px; height: 45px; border-radius: 12px; border: none; cursor: pointer;
            background: var(--primary-gradient); color: white; display: flex; align-items: center; justify-content: center;
        }

        /* --- MODALS --- */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: #1e293b; padding: 40px; border-radius: 24px; border: 1px solid var(--glass-border); width: 400px; text-align: center; }
        .modal-content input { width: 100%; background: #0f172a; border: 1px solid var(--glass-border); color: white; padding: 12px; border-radius: 10px; margin: 10px 0; }

        .btn-primary { background: #8b5cf6; color: white; border: none; padding: 12px 25px; border-radius: 10px; font-weight: 600; cursor: pointer; width: 100%; margin-top: 10px; }
        .btn-secondary { background: transparent; color: var(--text-muted); border: none; cursor: pointer; margin-top: 15px; }

        .delete-btn { background: #ef4444; color: white; border: none; padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 0.8rem; }

        /* --- GROUP INFO PANEL --- */
        .group-info-panel {
            background: rgba(139, 92, 246, 0.1);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: slideDown 0.4s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* --- INVITE MODAL --- */
        .invite-modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            animation: fadeInOverlay 0.3s ease-out;
        }

        @keyframes fadeInOverlay {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .invite-modal-content {
            background: #1e293b;
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 16px;
            padding: 30px;
            max-width: 450px;
            width: 90%;
            animation: slideUp 0.4s ease-out;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .invite-modal-content h2 {
            margin-top: 0;
            color: #8b5cf6;
            text-align: center;
        }

        .invite-copy-section {
            background: #0f172a;
            border: 1px solid rgba(6, 182, 212, 0.3);
            border-radius: 10px;
            padding: 15px;
            margin: 20px 0;
            display: flex;
            gap: 10px;
        }

        .invite-copy-input {
            flex: 1;
            background: transparent;
            border: none;
            color: #06b6d4;
            font-size: 0.85rem;
            word-break: break-all;
        }

        .invite-copy-btn {
            background: #06b6d4;
            color: #0f172a;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
            white-space: nowrap;
        }

        .invite-copy-btn:hover {
            background: #22d3ee;
            transform: scale(1.05);
        }

        .invite-copy-btn.copied {
            background: #10b981;
            color: white;
        }

        /* --- MESSAGE RESTRICTION --- */
        .restricted-warning {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid #ef4444;
            color: #fca5a5;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            margin: 10px 0;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .restricted-input {
            opacity: 0.5;
            pointer-events: none;
        }

        .group-info-details {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .group-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: white;
        }

        .group-meta {
            display: flex;
            gap: 15px;
            font-size: 0.85rem;
        }

        .group-meta span {
            display: flex;
            align-items: center;
            gap: 5px;
            color: var(--text-muted);
        }

        .admin-badge {
            background: #8b5cf6;
            color: white;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .group-actions {
            display: flex;
            gap: 10px;
        }

        .invite-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            animation: fadeIn 0.3s ease;
        }

        .invite-modal-content {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border: 1px solid var(--accent-color);
            border-radius: 12px;
            padding: 25px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            animation: slideDown 0.3s ease;
        }

        .invite-modal-content h2 {
            margin: 0 0 15px 0;
            color: white;
            font-size: 1.3rem;
        }

        .invite-copy-section {
            display: flex;
            gap: 8px;
            margin: 20px 0;
        }

        .invite-copy-input {
            flex: 1;
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--accent-color);
            color: white;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            word-break: break-all;
        }

        .invite-copy-btn {
            padding: 10px 20px;
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .invite-copy-btn:hover {
            background: #06b6d4;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(6, 182, 212, 0.3);
        }

        .invite-copy-btn.copied {
            background: #10b981;
        }

        .restricted-warning {
            background: #dc2626;
            color: white;
            padding: 12px 15px;
            border-radius: 6px;
            margin-bottom: 10px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .paste-link-section {
            padding: 15px 25px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .paste-link-label {
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.85rem;
        }

        .paste-link-container {
            display: flex;
            gap: 8px;
        }

        .paste-link-input {
            flex: 1;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--accent-color);
            color: white;
            border-radius: 6px;
            font-size: 0.85rem;
            font-family: monospace;
            transition: 0.2s;
        }

        .paste-link-input:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: #10b981;
        }

        .paste-link-btn {
            padding: 8px 12px;
            background: #10b981;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .paste-link-btn:hover {
            background: #059669;
            transform: translateY(-2px);
            box-shadow: 0 2px 8px rgba(16, 185, 129, 0.3);
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script src="activity.js"></script>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const API_BASE = 'http://localhost:5000/api';
        let socket = null;

        const getToken = () => localStorage.getItem('token');

        const App = () => {
            const [chats, setChats] = useState([]);
            const [activeChatId, setActiveChatId] = useState(null);
            const [currentUser] = useState(localStorage.getItem('user') || "Student");
            const [currentUserId] = useState(localStorage.getItem('userId') || "");
            const [messageInput, setMessageInput] = useState("");
            const [isTyping, setIsTyping] = useState(false);
            const [typingUser, setTypingUser] = useState(null);
            
            // UI States
            const [showCreateModal, setShowCreateModal] = useState(false);
            const [showPasswordModal, setShowPasswordModal] = useState(false);
            const [showInviteModal, setShowInviteModal] = useState(false);
            const [inviteLink, setInviteLink] = useState("");
            const [copied, setCopied] = useState(false);
            const [newGroup, setNewGroup] = useState({ name: '', pass: '' });
            const [pendingChat, setPendingChat] = useState(null);
            const [passInput, setPassInput] = useState("");
            const [authenticatedIds, setAuthenticatedIds] = useState([]);
            const [messageError, setMessageError] = useState("");
            const [uploadProgress, setUploadProgress] = useState(0);
            const [userRestricted, setUserRestricted] = useState(false);
            const [restrictedUntil, setRestrictedUntil] = useState(null);
            const [pasteLink, setPasteLink] = useState("");

            const messagesEndRef = useRef(null);
            const fileRef = useRef(null);
            const activeChat = chats.find(c => c._id === activeChatId);

            useEffect(() => {
                // Initialize activity tracking
                activityTracker.startTracking('chat');

                socket = io(API_BASE.replace('/api', ''), {
                    auth: { token: localStorage.getItem('token') }
                });

                socket.on('receive_message', (msg) => {
                    setChats(prev => prev.map(c => c._id === msg.chatId ? { ...c, messages: [...(c.messages || []), msg] } : c));
                });

                fetchChats();
                return () => socket.disconnect();
            }, []);

            useEffect(() => {
                if (activeChatId) {
                    socket.emit('join_chat', activeChatId);
                    // Load previous messages from database
                    loadChatMessages(activeChatId);
                }
                messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
            }, [activeChatId]);

            useEffect(() => {
                messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
            }, [activeChat?.messages]);

            const loadChatMessages = async (chatId) => {
                try {
                    const res = await fetch(`${API_BASE}/chats/${chatId}/messages`, {
                        headers: { Authorization: `Bearer ${localStorage.getItem('token')}` }
                    });
                    const data = await res.json();
                    setChats(prev => prev.map(c => c._id === chatId ? { ...c, messages: data.messages } : c));
                } catch (e) {
                    console.error('Error loading messages:', e);
                }
            };

            const fetchChats = async () => {
                try {
                    const res = await fetch(`${API_BASE}/chats`, { headers: { Authorization: `Bearer ${localStorage.getItem('token')}` }});
                    const data = await res.json();
                    setChats(data);
                } catch (e) { console.error(e); }
            };

            const handleChatSelection = (chat) => {
                if (chat.type === 'public' || authenticatedIds.includes(chat._id)) {
                    setActiveChatId(chat._id);
                } else {
                    setPendingChat(chat);
                    setShowPasswordModal(true);
                }
            };

            const verifyAndJoin = () => {
                if (passInput === pendingChat.password) {
                    setAuthenticatedIds([...authenticatedIds, pendingChat._id]);
                    setActiveChatId(pendingChat._id);
                    setShowPasswordModal(false);
                    setPassInput("");
                } else { alert("Incorrect Password"); }
            };

            const createGroup = async () => {
                if (!newGroup.name || !newGroup.pass) return alert("Fill all fields");
                try {
                    const res = await fetch(`${API_BASE}/chats`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${localStorage.getItem('token')}` },
                        body: JSON.stringify({ name: newGroup.name, type: 'private', password: newGroup.pass })
                    });
                    const data = await res.json();
                    setChats([...chats, data.chat]);
                    setAuthenticatedIds([...authenticatedIds, data.chat._id]);
                    setActiveChatId(data.chat._id);
                    setShowCreateModal(false);
                } catch (e) { alert("Error"); }
            };



            const sendMsg = () => {
                const trimmed = messageInput.trim();
                if (!trimmed) return;
                
                if (!activeChatId) {
                    setMessageError('Please select a group first');
                    setTimeout(() => setMessageError(''), 3000);
                    return;
                }

                if (userRestricted) {
                    setMessageError(`You are restricted from sending messages until ${new Date(restrictedUntil).toLocaleString()}`);
                    return;
                }
                
                try {
                    // Check for offensive content
                    const offensiveWords = ['badword1', 'badword2', 'badword3', 'abuse', 'hate', 'discriminat', 'racist', 'sexist', 'kill', 'murder', 'threat', 'violence', 'harm'];
                    const containsOffensive = offensiveWords.some(word => trimmed.toLowerCase().includes(word));
                    
                    if (containsOffensive) {
                        setMessageError('⚠️ Message contains inappropriate content. You are now restricted for 24 hours.');
                        setUserRestricted(true);
                        const futureDate = new Date();
                        futureDate.setHours(futureDate.getHours() + 24);
                        setRestrictedUntil(futureDate);
                        
                        // In real app, this would be sent to backend to persist
                        setTimeout(() => {
                            setUserRestricted(false);
                            setRestrictedUntil(null);
                            setMessageError('');
                        }, 24 * 60 * 60 * 1000);
                        return;
                    }

                    socket.emit('send_message', {
                        chatId: activeChatId,
                        sender: currentUser,
                        text: trimmed,
                        type: 'text'
                    });
                    setMessageInput("");
                    setMessageError("");
                } catch (error) {
                    console.error('Send error:', error);
                    setMessageError('Failed to send message');
                    setTimeout(() => setMessageError(''), 3000);
                }
            };

            const uploadFile = async (e) => {
                const file = e.target.files[0];
                if (!file) return;

                // Validate file size (50MB limit)
                const maxSize = 50 * 1024 * 1024;
                if (file.size > maxSize) {
                    alert('File too large (max 50MB)');
                    fileRef.current.value = '';
                    return;
                }

                const fd = new FormData();
                fd.append('file', file);
                
                try {
                    setUploadProgress(50);
                    const res = await fetch(`${API_BASE}/chats/${activeChatId}/upload-file`, {
                        method: 'POST',
                        headers: { Authorization: `Bearer ${localStorage.getItem('token')}` },
                        body: fd
                    });
                    
                    if (!res.ok) throw new Error('Upload failed');
                    
                    setUploadProgress(100);
                    const data = await res.json();
                    
                    socket.emit('send_message', {
                        chatId: activeChatId,
                        sender: currentUser,
                        text: `📄 ${file.name}`,
                        fileUrl: data.fileUrl,
                        fileName: file.name,
                        type: 'file'
                    });
                    
                    setTimeout(() => setUploadProgress(0), 500);
                    fileRef.current.value = '';
                } catch (error) {
                    console.error('File upload error:', error);
                    setMessageError('Failed to upload file');
                    setUploadProgress(0);
                    setTimeout(() => setMessageError(''), 3000);
                }
            };

            const openFilePreview = (fileUrl) => {
                if (!fileUrl) {
                    alert('File URL not available');
                    return;
                }
                try {
                    // Try to open in new tab for preview
                    const previewWindow = window.open(fileUrl, '_blank');
                    if (!previewWindow) {
                        // Fallback: create a download link if popup blocked
                        const link = document.createElement('a');
                        link.href = fileUrl;
                        link.download = '';
                        document.body.appendChild(link);
                        link.click();
                        document.body.removeChild(link);
                    }
                } catch (error) {
                    console.error('Preview error:', error);
                    alert('Unable to open file');
                }
            };

            const generateInviteLink = async () => {
                try {
                    const response = await fetch(`${API_BASE}/chats/${activeChatId}/invite`, {
                        method: 'GET',
                        headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                    });
                    
                    if (!response.ok) throw new Error('Failed to generate invite link');
                    
                    const data = await response.json();
                    const inviteUrl = `${window.location.origin}/frontend/invite.html?code=${data.inviteCode}`;
                    setInviteLink(inviteUrl);
                    setShowInviteModal(true);
                    setCopied(false);
                } catch (error) {
                    console.error('Error generating invite link:', error);
                    setMessageError('Failed to generate invite link');
                    setTimeout(() => setMessageError(''), 3000);
                }
            };

            const copyToClipboard = () => {
                navigator.clipboard.writeText(inviteLink).then(() => {
                    setCopied(true);
                    setTimeout(() => setCopied(false), 2000);
                }).catch(() => {
                    alert('Failed to copy to clipboard');
                });
            };

            const deleteGroup = async (groupId) => {
                try {
                    const response = await fetch(`${API_BASE}/chats/${groupId}`, {
                        method: 'DELETE',
                        headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                    });

                    if (!response.ok) throw new Error('Failed to delete group');

                    setChats(prev => prev.filter(c => c._id !== groupId));
                    setActiveChatId(null);
                    setMessageError('Group deleted successfully');
                    setTimeout(() => setMessageError(''), 3000);
                } catch (error) {
                    console.error('Error deleting group:', error);
                    setMessageError('Failed to delete group');
                    setTimeout(() => setMessageError(''), 3000);
                }
            };

            const exitGroup = async (groupId) => {
                try {
                    const response = await fetch(`${API_BASE}/chats/${groupId}/leave`, {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                    });

                    if (!response.ok) throw new Error('Failed to leave group');

                    setChats(prev => prev.filter(c => c._id !== groupId));
                    setActiveChatId(null);
                    setMessageError('You have left the group');
                    setTimeout(() => setMessageError(''), 3000);
                } catch (error) {
                    console.error('Error leaving group:', error);
                    setMessageError('Failed to leave group');
                    setTimeout(() => setMessageError(''), 3000);
                }
            };

            const joinViaLink = async () => {
                const link = pasteLink.trim();
                if (!link) {
                    setMessageError('Please paste a link');
                    setTimeout(() => setMessageError(''), 3000);
                    return;
                }

                try {
                    // Extract invite code from URL
                    const urlPattern = /code=([a-zA-Z0-9]+)/;
                    const match = link.match(urlPattern);
                    const inviteCode = match ? match[1] : null;

                    if (!inviteCode) {
                        setMessageError('Invalid invite link. Please check the URL.');
                        setTimeout(() => setMessageError(''), 3000);
                        return;
                    }

                    // Redirect to invite.html with the code
                    window.location.href = `${window.location.origin}/frontend/invite.html?code=${inviteCode}`;
                } catch (error) {
                    console.error('Error processing link:', error);
                    setMessageError('Failed to process invite link');
                    setTimeout(() => setMessageError(''), 3000);
                }
            };

            return (
                <div className="app-container">
                    <div className="sidebar">
                        <div className="sidebar-header">
                            <div className="brand">StudentHub</div>
                            <button className="icon-btn-circle" onClick={() => setShowCreateModal(true)}>+</button>
                        </div>
                        <div className="user-profile" style={{ display: 'flex', alignItems: 'center', gap: '10px', padding: '14px 18px', borderBottom: '1px solid rgba(255,255,255,0.08)' }}>
                            <div className="user-avatar" style={{ background: '#2563eb', width: '38px', height: '38px', borderRadius: '10px', fontSize: '1rem' }}>{currentUser[0]}</div>
                            <div style={{ display: 'flex', flexDirection: 'column', gap: '3px' }}>
                                <span style={{ fontWeight: 700 }}>{currentUser}</span>
                                <small style={{ color: '#9ca3af', fontSize: '0.8rem' }}>Online</small>
                            </div>
                        </div>

                        <div className="section-label">Groups</div>
                        <div className="group-cards">
                            {chats.length === 0 ? (
                                <div style={{color: '#94a3b8', padding: '10px 12px', borderRadius: '10px', background: 'rgba(255,255,255,0.03)'}}>No groups yet</div>
                            ) : (
                                chats.map(c => (
                                    <div
                                        key={c._id}
                                        className={`group-card ${activeChatId === c._id ? 'active' : ''}`}
                                        onClick={() => handleChatSelection(c)}
                                    >
                                        <div className="group-card-title">{c.name}</div>
                                        <div className="group-card-sub">
                                            {c.createdBy?.name || 'Unknown'}{c.createdBy && c.createdBy._id === currentUserId ? ' (Admin)' : ''}
                                        </div>
                                        <div className="group-card-meta">
                                            <span>{c.type === 'public' ? 'Public' : 'Private'}</span>
                                            <span>{c.messages?.length || 0} msgs</span>
                                        </div>
                                    </div>
                                ))
                            )}
                        </div>

                        <div className="paste-link-section">
                            <small className="paste-link-label">📌 Paste Invite Link</small>
                            <div className="paste-link-container">
                                <input 
                                    type="text" 
                                    placeholder="Paste invite link..." 
                                    value={pasteLink}
                                    onChange={(e) => setPasteLink(e.target.value)}
                                    onKeyPress={(e) => e.key === 'Enter' && joinViaLink()}
                                    className="paste-link-input"
                                />
                                <button 
                                    onClick={joinViaLink}
                                    className="paste-link-btn"
                                    title="Join group from invite link"
                                >
                                    ✓
                                </button>
                            </div>
                        </div>

                        <div style={{padding: '15px 25px', marginTop: 'auto', borderTop: '1px solid var(--glass-border)', display: 'flex', flexDirection: 'column', gap: '10px'}}>
                            <div style={{padding: '10px', background: 'rgba(139, 92, 246, 0.1)', borderRadius: '8px', fontSize: '0.85rem'}}>
                                <small style={{color: 'var(--text-muted)'}}>Active</small>
                                <div style={{color: 'var(--accent-color)', fontWeight: 600}}>{currentUser}</div>
                            </div>
                            <button onClick={() => { localStorage.removeItem('token'); localStorage.removeItem('user'); localStorage.removeItem('userId'); localStorage.removeItem('email'); localStorage.removeItem('role'); window.location.href = 'auth.html'; }} style={{padding: '10px 16px', background: '#ef4444', color: 'white', border: 'none', borderRadius: '8px', cursor: 'pointer', fontWeight: 600, transition: '0.3s'}}>🚪 Logout</button>
                        </div>
                    </div>

                    <div className="chat-area">
                        {activeChat ? (
                            <>
                                <div className="chat-header">
                                    <div>
                                        <h2>Chat: {activeChat.name}</h2>
                                        <small style={{ color: '#cbd5e1' }}>
                                            {activeChat.type === 'public' ? 'Public Group' : 'Private Group'} • {activeChat.messages?.length || 0} messages
                                        </small>
                                    </div>
                                </div>
                                <div className="group-info-panel" style={{ margin: '0 20px 10px', border: '1px solid rgba(255,255,255,0.08)' }}>
                                    <div className="group-info-details">
                                        <div className="group-name">{activeChat.name}</div>
                                        <div className="group-meta">
                                            <span>{activeChat.type === 'public' ? '📢 Public' : '🔒 Private'}</span>
                                            <span>Created by {activeChat.createdBy?.name || 'Unknown'}</span>
                                        </div>
                                    </div>
                                    <div className="group-actions" style={{ gap: '8px' }}>
                                        {activeChat.createdBy && activeChat.createdBy._id === currentUserId && (
                                            <button 
                                                className="delete-btn" 
                                                onClick={generateInviteLink}
                                                title="Copy invite link"
                                                style={{background: '#06b6d4', marginRight: '8px'}}
                                            >
                                                🔗 Invite
                                            </button>
                                        )}
                                        {activeChat.createdBy && activeChat.createdBy._id === currentUserId && (
                                            <button 
                                                className="delete-btn" 
                                                onClick={() => {
                                                    if (confirm(`Delete group "${activeChat.name}"? This cannot be undone.`)) {
                                                        deleteGroup(activeChatId);
                                                    }
                                                }}
                                                title="Only group creator can delete"
                                            >
                                                🗑️ Delete Group
                                            </button>
                                        )}
                                        {(!activeChat.createdBy || activeChat.createdBy._id !== currentUserId) && (
                                            <>
                                                <span style={{color: 'var(--text-muted)', fontSize: '0.85rem', padding: '6px 12px'}}>
                                                    👤 Member
                                                </span>
                                                <button 
                                                    className="delete-btn" 
                                                    onClick={() => {
                                                        if (confirm(`Leave group "${activeChat.name}"?`)) {
                                                            exitGroup(activeChatId);
                                                        }
                                                    }}
                                                    title="Leave this group"
                                                    style={{background: '#f97316', marginLeft: '8px'}}
                                                >
                                                    🚪 Exit
                                                </button>
                                            </>
                                        )}
                                    </div>
                                </div>
                                <div className="messages-box">
                                    {activeChat.messages && activeChat.messages.length > 0 ? (
                                        activeChat.messages.map((m, i) => (
                                            <div key={i} className={`message ${m.sender === currentUser ? 'sent' : 'received'}`}>
                                                <div className="msg-bubble">
                                                    <small style={{display:'block', opacity:0.7, marginBottom:4, fontWeight: 600}}>
                                                        {m.sender === currentUser ? 'You' : m.sender}
                                                    </small>
                                                    {m.type === 'file' && m.fileUrl ? (
                                                        <div style={{marginTop: 8}}>
                                                            <p>{m.text}</p>
                                                            <div style={{marginTop: 8, display: 'flex', gap: 8, flexWrap: 'wrap'}}>
                                                                <a 
                                                                    href={m.fileUrl} 
                                                                    target="_blank" 
                                                                    rel="noopener noreferrer" 
                                                                    className="file-link"
                                                                    download={m.fileName}
                                                                >
                                                                    📥 Download
                                                                </a>
                                                                <button 
                                                                    onClick={() => openFilePreview(m.fileUrl)} 
                                                                    className="preview-file-btn"
                                                                >
                                                                    👁️ Preview
                                                                </button>
                                                            </div>
                                                        </div>
                                                    ) : (
                                                        m.text
                                                    )}
                                                    {m.timestamp && (
                                                        <span className="msg-time">
                                                            {new Date(m.timestamp).toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'})}
                                                        </span>
                                                    )}
                                                </div>
                                            </div>
                                        ))
                                    ) : (
                                        <div style={{textAlign: 'center', opacity: 0.5, margin: 'auto'}}>
                                            <p>No messages yet. Start the conversation!</p>
                                        </div>
                                    )}
                                    {typingUser && typingUser !== currentUser && (
                                        <div className={`message received`}>
                                            <div className="typing-indicator">
                                                <div className="typing-dot"></div>
                                                <div className="typing-dot"></div>
                                                <div className="typing-dot"></div>
                                            </div>
                                        </div>
                                    )}
                                    <div ref={messagesEndRef} />
                                </div>
                                <div className="chat-footer">
                                    {userRestricted && (
                                        <div className="restricted-warning">
                                            ⛔ You are restricted from sending messages until {new Date(restrictedUntil).toLocaleString()}
                                        </div>
                                    )}
                                    {messageError && (
                                        <div style={{position: 'absolute', bottom: 80, left: 30, right: 30, background: '#ef4444', padding: '10px 15px', borderRadius: '8px', fontSize: '0.85rem', color: 'white', animation: 'fadeIn 0.3s ease'}}>
                                            {messageError}
                                        </div>
                                    )}
                                    {uploadProgress > 0 && uploadProgress < 100 && (
                                        <div style={{position: 'absolute', bottom: 80, left: 30, right: 30, background: 'rgba(139, 92, 246, 0.2)', padding: '10px 15px', borderRadius: '8px', fontSize: '0.85rem', color: '#c4b5fd'}}>
                                            📤 Uploading... {uploadProgress}%
                                        </div>
                                    )}
                                    <input type="file" ref={fileRef} style={{display:'none'}} onChange={uploadFile} />
                                    <button className="icon-btn-circle" style={{background:'#1e293b', transition: '0.2s'}} title="Upload file" onMouseOver={e => e.target.style.background='#334155'} onMouseOut={e => e.target.style.background='#1e293b'} onClick={() => fileRef.current?.click()} disabled={!activeChatId || userRestricted}>📎</button>
                                    <input 
                                        className="chat-input" 
                                        placeholder={userRestricted ? "You are restricted from messaging" : "Type a message..."} 
                                        value={messageInput} 
                                        onChange={e => setMessageInput(e.target.value)} 
                                        onKeyPress={e => e.key === 'Enter' && !userRestricted && sendMsg()}
                                        disabled={!activeChatId || userRestricted}
                                    />
                                    <button className="icon-btn-circle" onClick={sendMsg} title="Send message" disabled={!activeChatId || userRestricted}>➤</button>
                                </div>
                            </>
                        ) : (
                            <div style={{margin:'auto', textAlign:'center', opacity:0.5}}>
                                <h2>Select a group to start chatting</h2>
                            </div>
                        )}
                    </div>

                    {showCreateModal && (
                        <div className="modal">
                            <div className="modal-content">
                                <h2>Create Group</h2>
                                <input placeholder="Group Name" onChange={e => setNewGroup({...newGroup, name: e.target.value})} />
                                <input type="password" placeholder="Password" onChange={e => setNewGroup({...newGroup, pass: e.target.value})} />
                                <button className="btn-primary" onClick={createGroup}>Create</button>
                                <button className="btn-secondary" onClick={() => setShowCreateModal(false)}>Cancel</button>
                            </div>
                        </div>
                    )}

                    {showPasswordModal && (
                        <div className="modal">
                            <div className="modal-content">
                                <h2>🔒 Locked Group</h2>
                                <p>Enter password for {pendingChat?.name}</p>
                                <input type="password" autoFocus onChange={e => setPassInput(e.target.value)} onKeyPress={e => e.key === 'Enter' && verifyAndJoin()} />
                                <button className="btn-primary" onClick={verifyAndJoin}>Unlock</button>
                                <button className="btn-secondary" onClick={() => setShowPasswordModal(false)}>Cancel</button>
                            </div>
                        </div>
                    )}

                    {showInviteModal && (
                        <div className="invite-modal-overlay" onClick={() => setShowInviteModal(false)}>
                            <div className="invite-modal-content" onClick={(e) => e.stopPropagation()}>
                                <h2>📧 Invite to Group</h2>
                                <p style={{textAlign: 'center', color: 'var(--text-muted)', marginBottom: '20px'}}>
                                    Share this link to invite others to <strong>{activeChat?.name}</strong>
                                </p>
                                
                                <div className="invite-copy-section">
                                    <input 
                                        type="text" 
                                        className="invite-copy-input" 
                                        value={inviteLink} 
                                        readOnly 
                                    />
                                    <button 
                                        className={`invite-copy-btn ${copied ? 'copied' : ''}`}
                                        onClick={copyToClipboard}
                                    >
                                        {copied ? '✓ Copied' : 'Copy'}
                                    </button>
                                </div>

                                <p style={{textAlign: 'center', color: 'var(--text-muted)', fontSize: '0.85rem', marginBottom: '20px'}}>
                                    Anyone with this link can join the group
                                </p>

                                <button 
                                    className="btn-primary" 
                                    onClick={() => setShowInviteModal(false)}
                                    style={{width: '100%'}}
                                >
                                    Done
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
