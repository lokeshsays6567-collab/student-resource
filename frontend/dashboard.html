<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard - Pro</title>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* --- THEME: LUMINOUS DASHBOARD --- */
        :root {
            --bg-body: #0f172a;
            --bg-panel: #1e293b;
            --bg-card: #334155;
            
            --primary: #8b5cf6;
            --primary-hover: #7c3aed;
            --primary-glow: rgba(139, 92, 246, 0.5);
            --accent: #06b6d4;
            
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            
            --glass: rgba(30, 41, 59, 0.7);
            --border: 1px solid rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; outline: none; scrollbar-width: thin; }

        html, body {
            margin: 0; padding: 0;
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            height: 100vh; width: 100vw;
            overflow: hidden;
        }

        #root { width: 100%; height: 100%; }

        /* --- LAYOUT --- */
        .app-container { display: flex; width: 100%; height: 100%; }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 280px;
            background: var(--bg-panel);
            border-right: var(--border);
            display: flex; flex-direction: column;
            padding: 25px; flex-shrink: 0;
            height: 100%; overflow-y: auto;
        }

        .brand {
            font-size: 1.5rem; font-weight: 700; 
            background: linear-gradient(to right, var(--primary), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 40px; flex-shrink: 0;
        }

        .nav-item {
            padding: 12px 16px; margin-bottom: 8px;
            border-radius: 12px; color: var(--text-muted);
            cursor: pointer; font-weight: 500;
            transition: 0.3s; display: flex; align-items: center; gap: 12px;
            text-decoration: none;
        }
        .nav-item:hover { background: rgba(255,255,255,0.05); color: white; }
        .nav-item.active { background: var(--primary); color: white; box-shadow: 0 4px 15px var(--primary-glow); }

        .session-card {
            margin-top: auto; padding: 15px; 
            background: rgba(255,255,255,0.05); 
            border-radius: 12px; border: var(--border);
            flex-shrink: 0;
        }

        /* --- MAIN AREA --- */
        .main-content {
            flex: 1; display: flex; flex-direction: column;
            overflow: hidden; position: relative;
            background: radial-gradient(circle at top right, #1e1b4b, transparent);
            height: 100%;
        }

        .header {
            padding: 20px 40px;
            display: flex; justify-content: space-between; align-items: center;
            background: var(--glass); backdrop-filter: blur(10px);
            border-bottom: var(--border);
            z-index: 10; flex-shrink: 0; height: 80px;
        }
        .welcome-text h2 { margin: 0; font-size: 1.5rem; }
        .welcome-text p { margin: 5px 0 0; color: var(--text-muted); font-size: 0.9rem; }

        .content-scroll { padding: 40px; overflow-y: auto; flex: 1; width: 100%; }

        /* --- WIDGETS --- */
        .doc-card {
            background: var(--bg-panel); border: var(--border);
            border-radius: 16px; padding: 20px; margin-bottom: 15px;
            display: flex; justify-content: space-between; align-items: center;
            transition: 0.3s; animation: fadeIn 0.4s ease-out;
        }
        .doc-card:hover { transform: translateX(5px); border-color: var(--primary); }
        .doc-info h4 { margin: 0 0 8px 0; font-size: 1.1rem; color: white; }
        .doc-meta { display: flex; gap: 10px; align-items: center; font-size: 0.85rem; color: var(--text-muted); }
        
        .badge { padding: 4px 10px; border-radius: 6px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; }
        .badge-purple { background: rgba(139, 92, 246, 0.2); color: #c4b5fd; }
        .badge-blue { background: rgba(6, 182, 212, 0.2); color: #67e8f9; }
        .badge-gray { background: rgba(148, 163, 184, 0.2); color: #cbd5e1; }

        .download-btn {
            background: transparent; border: 1px solid var(--accent);
            color: var(--accent); padding: 8px 16px; border-radius: 8px;
            cursor: pointer; transition: 0.2s; font-weight: 600; text-decoration: none;
        }
        .download-btn:hover { background: var(--accent); color: #000; }

        /* --- LEARNING HUB STYLES --- */
        .activity-panel {
            background: linear-gradient(145deg, var(--bg-panel), #161e2e);
            padding: 25px; border-radius: 20px; border: var(--border);
            margin-bottom: 40px; display: flex; align-items: center; justify-content: space-between;
        }
        .activity-stat { text-align: center; }
        .stat-val { font-size: 2rem; font-weight: 700; color: var(--accent); }
        .stat-label { font-size: 0.9rem; color: var(--text-muted); }
        
        .heatmap { display: flex; gap: 6px; }
        .heat-col { display: flex; flex-direction: column; gap: 6px; }
        .heat-cell { width: 12px; height: 12px; border-radius: 3px; background: #334155; }
        .heat-cell.low { background: #1e3a8a; }
        .heat-cell.med { background: #3b82f6; }
        .heat-cell.high { background: #60a5fa; }

        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .video-card {
            background: var(--bg-panel); border-radius: 16px; overflow: hidden;
            border: var(--border); transition: 0.3s; cursor: pointer; position: relative;
        }
        .video-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.3); border-color: var(--primary); }
        .thumbnail-wrapper { height: 160px; position: relative; background: #000; overflow: hidden; }
        .thumbnail-img { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; transition: 0.3s; }
        .video-card:hover .thumbnail-img { opacity: 1; transform: scale(1.05); }
        .play-btn { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; opacity: 0; transition: 0.3s; background: rgba(0,0,0,0.3); }
        .video-card:hover .play-btn { opacity: 1; }
        .play-icon { font-size: 3rem; color: white; filter: drop-shadow(0 2px 5px rgba(0,0,0,0.5)); }
        .card-body { padding: 15px; }
        .tag { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; color: var(--accent); margin-bottom: 5px; display: block; }
        .video-title { font-size: 1rem; font-weight: 600; line-height: 1.4; margin-bottom: 8px; }
        .video-meta { font-size: 0.8rem; color: var(--text-muted); display: flex; justify-content: space-between; }

        .tabs { display: flex; gap: 15px; margin-bottom: 25px; overflow-x: auto; padding-bottom: 5px; }
        .tab {
            padding: 8px 20px; border-radius: 20px;
            background: var(--bg-panel); border: var(--border);
            color: var(--text-muted); cursor: pointer; white-space: nowrap; transition: 0.2s;
        }
        .tab:hover { color: white; border-color: var(--text-muted); }
        .tab.active { background: var(--primary); color: white; border-color: var(--primary); }

        .search-input {
            width: 100%; background: var(--bg-body); border: var(--border);
            padding: 12px 20px; border-radius: 30px; color: white; transition: 0.3s;
        }
        .search-input:focus { border-color: var(--primary); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script src="activity.js"></script>
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const API_BASE = 'http://localhost:5000/api';

        const getToken = () => localStorage.getItem('token');

        const YOUTUBE_VIDEOS = [
            { id: 1, title: "Learn Python in 100 Seconds", channel: "Fireship", category: "Python", views: "2.5M", img: "https://img.youtube.com/vi/x7X9w_GIm1s/maxresdefault.jpg" },
            { id: 2, title: "JavaScript Async/Await Explained", channel: "Traversy Media", category: "JavaScript", views: "1.2M", img: "https://img.youtube.com/vi/PoRJizFvM7s/maxresdefault.jpg" },
            { id: 3, title: "React Hooks Tutorial", channel: "freeCodeCamp", category: "React", views: "3.1M", img: "https://img.youtube.com/vi/F2WE0KAuWD0/maxresdefault.jpg" },
            { id: 4, title: "CSS Grid Tutorial", channel: "Web Dev Simplified", category: "CSS", views: "890K", img: "https://img.youtube.com/vi/EiNiSFaiDU4/maxresdefault.jpg" },
            { id: 5, title: "Database Design Principles", channel: "Computerphile", category: "Database", views: "420K", img: "https://img.youtube.com/vi/W2Z7fbCLSTw/maxresdefault.jpg" },
            { id: 6, title: "Data Structures Explained", channel: "Abdul Bari", category: "DSA", views: "4.2M", img: "https://img.youtube.com/vi/RBSGKlAvoiM/maxresdefault.jpg" },
            { id: 7, title: "REST API Best Practices", channel: "Code with Ania Kubów", category: "Backend", views: "256K", img: "https://img.youtube.com/vi/S8KA8qySRQs/maxresdefault.jpg" },
            { id: 8, title: "Git & GitHub Crash Course", channel: "Traversy Media", category: "Git", views: "2.8M", img: "https://img.youtube.com/vi/SWYqp7iY_Tc/maxresdefault.jpg" }
        ];

        const RECENT_DOCS = [
            { id: 101, name: "Data Structures Notes.pdf", subject: "CS-201", type: "Notes", class: "Class A", desc: "Tree Traversal algorithms", uploader: "Admin", uploadedAt: new Date() },
            { id: 102, name: "Chemistry Lab Manual.docx", subject: "Chemistry", type: "Lab", class: "12th Grade", desc: "Organic Chemistry Exp 1", uploader: "Teacher", uploadedAt: new Date() },
            { id: 103, name: "History Assignment.pdf", subject: "History", type: "Assignment", class: "10th Grade", desc: "World War II Summary", uploader: "Student", uploadedAt: new Date() }
        ];

        const LearningHub = () => {
            const [searchQuery, setSearchQuery] = useState("");
            const [activeCategory, setActiveCategory] = useState("All");

            const filteredVideos = useMemo(() => {
                return YOUTUBE_VIDEOS.filter(video => {
                    const matchesSearch = video.title.toLowerCase().includes(searchQuery.toLowerCase()) || 
                                          video.category.toLowerCase().includes(searchQuery.toLowerCase());
                    const matchesCategory = activeCategory === "All" || video.category === activeCategory;
                    return matchesSearch && matchesCategory;
                });
            }, [searchQuery, activeCategory]);

            return (
                <div className="content-scroll">
                    <div className="activity-panel">
                        <div className="activity-stat">
                            <div className="stat-val">12</div>
                            <div className="stat-label">Videos Watched</div>
                        </div>
                        <div className="activity-stat">
                            <div className="stat-val">4.5h</div>
                            <div className="stat-label">Study Time</div>
                        </div>
                        <div style={{flex:1, marginLeft:'40px'}}>
                            <div style={{marginBottom:'10px', fontSize:'0.9rem', color:'var(--text-muted)'}}>Weekly Activity Map</div>
                            <div className="heatmap">
                                {[...Array(14)].map((_, i) => (
                                    <div key={i} className="heat-col">
                                        <div className={`heat-cell ${i%2===0?'high':'low'}`}></div>
                                        <div className={`heat-cell ${i%3===0?'med':'low'}`}></div>
                                        <div className={`heat-cell ${i%4===0?'high':'med'}`}></div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>

                    <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'20px'}}>
                        <h2 style={{margin:0}}>📺 Recommended Videos</h2>
                        <input 
                            type="text" 
                            className="search-input" 
                            style={{width:'300px'}}
                            placeholder="Search topics..."
                            value={searchQuery}
                            onChange={(e) => setSearchQuery(e.target.value)}
                        />
                    </div>

                    <div className="tabs">
                        {["All", "Python", "JavaScript", "React", "CSS", "Database", "DSA", "Backend", "Git"].map(cat => (
                            <div 
                                key={cat} 
                                className={`tab ${activeCategory === cat ? 'active' : ''}`}
                                onClick={() => setActiveCategory(cat)}
                            >
                                {cat}
                            </div>
                        ))}
                    </div>

                    <div className="grid-container">
                        {filteredVideos.length > 0 ? filteredVideos.map(video => (
                            <div key={video.id} className="video-card" onClick={() => window.open(`https://www.youtube.com/results?search_query=${encodeURIComponent(video.title)}`, '_blank')}>
                                <div className="thumbnail-wrapper">
                                    <img src={video.img} alt={video.title} className="thumbnail-img" onError={(e) => e.target.src = 'https://via.placeholder.com/320x180?text=Video'} />
                                    <div className="play-btn"><span className="play-icon">▶</span></div>
                                </div>
                                <div className="card-body">
                                    <span className="tag">{video.category}</span>
                                    <div className="video-title">{video.title}</div>
                                    <div className="video-meta">
                                        <span>{video.channel}</span>
                                        <span>{video.views}</span>
                                    </div>
                                </div>
                            </div>
                        )) : (
                            <div style={{gridColumn:'1/-1', textAlign:'center', padding:'40px', color:'var(--text-muted)'}}>
                                No videos found. Try a different search!
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const DashboardHome = ({ onViewChange }) => {
            const [recentDocs, setRecentDocs] = useState(RECENT_DOCS);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);

            useEffect(() => { fetchRecentDocuments(); }, []);

            const fetchRecentDocuments = async () => {
                try {
                    setLoading(true);
                    const token = getToken();
                    if (!token) { setLoading(false); return; }

                    const response = await fetch(`${API_BASE}/documents`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });

                    if(response.ok) {
                        const data = await response.json();
                        if (Array.isArray(data)) {
                            const recent = data.slice(0, 6).sort((a, b) => new Date(b.uploadedAt) - new Date(a.uploadedAt));
                            setRecentDocs(recent);
                        }
                    }
                } catch (err) {
                    console.warn('API Offline, using fallback.');
                } finally {
                    setLoading(false);
                }
            };

            const formatFileSize = (bytes) => {
                if (!bytes || bytes === 0) return '0 B';
                const k = 1024;
                const sizes = ['B', 'KB', 'MB', 'GB'];
                const i = Math.floor(Math.log(bytes) / Math.log(k));
                return Math.round(bytes / Math.pow(k, i) * 100) / 100 + ' ' + sizes[i];
            };

            return (
            <div className="content-scroll">
                <div style={{background: 'linear-gradient(135deg, rgba(30, 41, 59, 0.9), rgba(15, 23, 42, 0.9))', padding: '40px', borderRadius: '24px', border: 'var(--border)', textAlign: 'center', marginBottom: '40px'}}>
                    <h3 style={{fontSize: '2rem', margin: '0 0 10px 0', background: 'linear-gradient(to right, #fff, #94a3b8)', WebkitBackgroundClip: 'text', color: 'transparent'}}>👋 Welcome to your Student Portal</h3>
                    <p style={{color: 'var(--text-muted)'}}>Access your learning hub, documents, and chats from the sidebar.</p>
                </div>

                <h3 style={{marginBottom:'20px', display:'flex', alignItems:'center', gap:'10px'}}>
                    📂 Recently Uploaded Documents {loading && <small>(Updating...)</small>}
                </h3>
                
                <div style={{marginBottom:'40px'}}>
                    {recentDocs.map(doc => (
                        <div key={doc.id || doc._id} className="doc-card" style={{flexDirection:'column', alignItems:'flex-start'}}>
                            <div className="doc-info" style={{width:'100%'}}>
                                <h4>{doc.name || doc.title}</h4>
                                <div className="doc-meta">
                                    <span className="badge badge-purple">{doc.subject || 'General'}</span>
                                    <span className="badge badge-blue">{doc.type || 'Notes'}</span>
                                    <span className="badge badge-gray">{doc.class || 'N/A'}</span>
                                    <span>📦 {formatFileSize(doc.fileSize)}</span>
                                    <span>👤 {doc.uploaderName || doc.uploader}</span>
                                </div>
                                {(doc.description || doc.desc) && <p style={{color:'var(--text-muted)', fontSize:'0.9rem', marginTop:'8px'}}>📝 {doc.description || doc.desc}</p>}
                            </div>
                            <a href="resources.html" style={{marginTop:'12px', display:'inline-block', background:'var(--accent)', color:'#000', padding:'8px 16px', borderRadius:'8px', textDecoration:'none', fontWeight:'600'}}>
                                View All Documents →
                            </a>
                        </div>
                    ))}
                </div>

                <h3 style={{marginBottom:'20px'}}>🎬 Trending YouTube Videos</h3>
                <div className="grid-container" style={{marginBottom:'40px'}}>
                    {YOUTUBE_VIDEOS.slice(0, 4).map(video => (
                        <div key={video.id} className="video-card" onClick={() => window.open(`https://www.youtube.com/results?search_query=${encodeURIComponent(video.title)}`, '_blank')}>
                            <div className="thumbnail-wrapper">
                                <img src={video.img} alt={video.title} className="thumbnail-img" />
                                <div className="play-btn"><span className="play-icon">▶</span></div>
                            </div>
                            <div className="card-body">
                                <span className="tag">{video.category}</span>
                                <div className="video-title">{video.title}</div>
                                <div className="video-meta"><span>{video.channel}</span><span>{video.views}</span></div>
                            </div>
                        </div>
                    ))}
                </div>
            </div>
            );
        };

        const App = () => {
            const [currentView, setCurrentView] = useState('home');
            const [user, setUser] = useState(() => localStorage.getItem('user') || localStorage.getItem('username') || 'Student');
            const [timeSpent, setTimeSpent] = useState(0);

            useEffect(() => {
                const timer = setInterval(() => setTimeSpent(prev => prev + 1), 1000);
                return () => clearInterval(timer);
            }, []);

            useEffect(() => {
                activityTracker.startTracking('homepage');
            }, []);

            const formatTime = (s) => {
                const h = Math.floor(s / 3600);
                const m = Math.floor((s % 3600) / 60);
                const sec = s % 60;
                return `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
            };

            return (
                <div className="app-container">
                    <div className="sidebar">
                        <div className="brand">StudentHub</div>
                        <div className="user-widget" style={{display:'flex', alignItems:'center', gap:'12px', marginBottom:'12px'}}>
                            <div className="user-avatar" style={{width:44, height:44, borderRadius:8, background:'var(--accent)', display:'flex', alignItems:'center', justifyContent:'center', fontWeight:700, color:'#000'}}>
                                {user && user.charAt ? user.charAt(0).toUpperCase() : 'U'}
                            </div>
                            <div style={{display:'flex', flexDirection:'column'}}>
                                <div style={{fontWeight:700}}>{user}</div>
                                <a href="profile.html" style={{fontSize:'0.85rem', color:'var(--text-muted)', textDecoration:'none'}}>View Profile</a>
                            </div>
                        </div>
                        <div className={`nav-item ${currentView === 'home' ? 'active' : ''}`} onClick={() => setCurrentView('home')}>🏠 Dashboard</div>
                        <a href="resources.html" className="nav-item">📄 Documents</a>
                        <a href="learning_hub.html" className="nav-item">🎯 Learning Hub</a>
                        <a href="chat.html" className="nav-item">💬 Group Chats</a>
                        <a href="feedback.html" className="nav-item">⭐ Feedback</a>
                        <a href="metadata.html" className="nav-item">📊 Metadata</a>
                        <a href="profile.html" className="nav-item">👤 Profile</a>
                        <div className="session-card">
                            <small style={{color:'var(--accent)'}}>Current Session</small>
                            <div style={{fontSize:'1.2rem', fontWeight:'bold'}}>{formatTime(timeSpent)}</div>
                        </div>
                        <div className="nav-item" onClick={() => { localStorage.removeItem('token'); localStorage.removeItem('user'); localStorage.removeItem('userId'); localStorage.removeItem('email'); localStorage.removeItem('role'); window.location.href = 'auth.html?logout=true'; }} style={{marginTop:'20px', borderTop: '1px solid rgba(255,255,255,0.1)', paddingTop:'20px', color:'#ff6b6b'}}>🚪 Logout</div>
                    </div>

                    <div className="main-content">
                        <div className="header">
                            <div className="welcome-text">
                                <h2>{currentView === 'home' ? 'Dashboard' : 'Learning Hub'}</h2>
                                <p>Welcome back, {user}</p>
                            </div>
                        </div>
                        {currentView === 'home' && <DashboardHome onViewChange={setCurrentView} />}
                        {currentView === 'learning' && <LearningHub />}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
