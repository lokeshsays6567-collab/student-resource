<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - StudentHub</title>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-body: #0f172a;
            --bg-panel: #1e293b;
            --primary: #8b5cf6;
            --primary-glow: rgba(139, 92, 246, 0.5);
            --accent: #06b6d4;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --glass: rgba(30, 41, 59, 0.7);
            --border: 1px solid rgba(255, 255, 255, 0.1);
            --success: #10b981;
        }

        * { box-sizing: border-box; outline: none; scrollbar-width: thin; }

        html, body {
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        #root { width: 100%; height: 100%; }

        .app-container { display: flex; width: 100%; height: 100%; }

        .sidebar {
            width: 280px;
            background: var(--bg-panel);
            border-right: var(--border);
            display: flex; flex-direction: column;
            padding: 25px;
            flex-shrink: 0;
            height: 100%;
            overflow-y: auto;
        }

        .brand {
            font-size: 1.5rem; font-weight: 700; 
            background: linear-gradient(to right, var(--primary), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 40px;
            flex-shrink: 0;
        }

        .nav-item {
            padding: 12px 16px; margin-bottom: 8px;
            border-radius: 12px; color: var(--text-muted);
            cursor: pointer; font-weight: 500;
            transition: 0.3s; display: flex; align-items: center; gap: 12px;
            text-decoration: none;
        }
        .nav-item:hover { background: rgba(255,255,255,0.05); color: white; }
        .nav-item.active { background: var(--primary); color: white; box-shadow: 0 4px 15px var(--primary-glow); }

        .session-card {
            margin-top: auto; padding: 15px; 
            background: rgba(255,255,255,0.05); 
            border-radius: 12px; border: var(--border);
            flex-shrink: 0;
        }

        .main-content {
            flex: 1;
            display: flex; flex-direction: column;
            overflow: hidden;
            position: relative;
            background: radial-gradient(circle at top right, #1e1b4b, transparent);
            height: 100%;
        }

        .header {
            padding: 20px 40px;
            display: flex; justify-content: space-between; align-items: center;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-bottom: var(--border);
            z-index: 10;
            flex-shrink: 0;
            height: 80px;
        }
        .header h2 { margin: 0; font-size: 1.5rem; }

        .content-scroll {
            padding: 40px;
            overflow-y: auto;
            flex: 1;
            width: 100%;
        }

        .profile-header {
            background: linear-gradient(145deg, var(--bg-panel), #161e2e);
            padding: 40px; border-radius: 20px;
            border: var(--border);
            margin-bottom: 40px;
            display: flex; align-items: center; gap: 30px;
        }

        .profile-avatar {
            width: 120px; height: 120px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: 24px;
            display: flex; align-items: center; justify-content: center;
            font-size: 3rem; font-weight: bold; color: white;
            box-shadow: 0 10px 30px var(--primary-glow);
        }

        .profile-info h2 { margin: 0 0 5px; font-size: 1.8rem; color: white; }
        .profile-info p { margin: 3px 0; color: var(--text-muted); font-size: 1rem; }
        .profile-meta { display: flex; gap: 20px; margin-top: 15px; }
        .meta-item { font-size: 0.9rem; color: var(--text-muted); }

        .stats-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 25px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--bg-panel);
            border: var(--border);
            border-radius: 16px;
            padding: 25px;
            text-align: center;
            transition: 0.3s;
        }
        .stat-card:hover { transform: translateY(-5px); border-color: var(--primary); }

        .stat-icon { font-size: 2.5rem; margin-bottom: 15px; }
        .stat-value { font-size: 2.2rem; font-weight: 700; color: var(--accent); margin-bottom: 5px; }
        .stat-label { font-size: 0.9rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }

        .files-section {
            background: var(--bg-panel);
            border: var(--border);
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 40px;
        }

        .section-header {
            padding: 25px 30px;
            border-bottom: var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }
        .section-header h3 { margin: 0; font-size: 1.2rem; color: white; }

        .files-table {
            width: 100%;
            border-collapse: collapse;
        }

        .files-table th {
            padding: 15px 30px;
            text-align: left;
            background: rgba(0,0,0,0.2);
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .files-table td {
            padding: 18px 30px;
            border-bottom: var(--border);
            color: var(--text-main);
        }

        .files-table tr:last-child td { border-bottom: none; }
        .files-table tr:hover { background: rgba(255,255,255,0.05); }

        .file-name { font-weight: 600; color: white; }
        .file-size { color: var(--text-muted); font-size: 0.9rem; }
        .file-date { color: var(--text-muted); font-size: 0.9rem; }

        .badge {
            padding: 4px 10px; border-radius: 6px;
            font-size: 0.75rem; font-weight: 700; text-transform: uppercase;
        }
        .badge-notes { background: rgba(139, 92, 246, 0.2); color: #c4b5fd; }
        .badge-assignment { background: rgba(6, 182, 212, 0.2); color: #67e8f9; }
        .badge-question { background: rgba(16, 185, 129, 0.2); color: #6ee7b7; }
        .badge-lab { background: rgba(245, 158, 11, 0.2); color: #fcd34d; }

        .download-btn {
            background: transparent; border: 1px solid var(--accent);
            color: var(--accent); padding: 6px 12px; border-radius: 6px;
            cursor: pointer; transition: 0.2s; font-weight: 600; font-size: 0.85rem;
        }
        .download-btn:hover { background: var(--accent); color: #000; }

        .empty-state {
            text-align: center;
            padding: 60px 30px;
            color: var(--text-muted);
        }
        .empty-state-icon { font-size: 3rem; margin-bottom: 15px; opacity: 0.3; }
        .empty-state h4 { margin: 0 0 10px; font-size: 1.1rem; color: white; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        * { animation: fadeIn 0.4s ease-out; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script src="activity.js"></script>
    <script type="text/babel">
        const { useState, useEffect } = React;
        const API_BASE = 'http://localhost:5000/api';

        const getToken = () => localStorage.getItem('token');

        const App = () => {
            const [user, setUser] = useState(() => localStorage.getItem('user') || localStorage.getItem('username') || 'Student');
            const [uploadedFiles, setUploadedFiles] = useState([]);
            const [totalTimeSpent, setTotalTimeSpent] = useState(0);
            const [currentSessionTime, setCurrentSessionTime] = useState(0);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const savedUser = localStorage.getItem('user');
                if(savedUser) setUser(savedUser);

                // Initialize activity tracking
                activityTracker.startTracking('profile');

                const savedTotal = localStorage.getItem('totalTimeSpent');
                if(savedTotal) setTotalTimeSpent(parseInt(savedTotal));

                const savedSession = sessionStorage.getItem('timeSpent');
                if(savedSession) setCurrentSessionTime(parseInt(savedSession));

                fetchUserFiles();

                const timer = setInterval(() => {
                    setCurrentSessionTime(prev => {
                        const newVal = prev + 1;
                        sessionStorage.setItem('timeSpent', newVal);
                        setTotalTimeSpent(prev2 => {
                            const total = prev2 + 1;
                            localStorage.setItem('totalTimeSpent', total);
                            return total;
                        });
                        return newVal;
                    });
                }, 1000);

                return () => clearInterval(timer);
            }, []);

            const fetchUserFiles = async () => {
                try {
                    const response = await fetch(`${API_BASE}/documents`, {
                        headers: { Authorization: `Bearer ${getToken()}` }
                    });
                    
                    if (!response.ok) throw new Error('Failed to fetch files');
                    
                    const data = await response.json();
                    
                        if (Array.isArray(data)) {
                            const currentUserId = localStorage.getItem('userId');
                            const currentUserName = localStorage.getItem('user');

                            const filtered = data.filter(doc => {
                                if (!doc) return false;
                                // normalize uploader id (could be ObjectId or populated object)
                                let uploaderId = null;
                                if (doc.uploader) {
                                    if (typeof doc.uploader === 'string') uploaderId = doc.uploader;
                                    else if (doc.uploader._id) uploaderId = String(doc.uploader._id);
                                    else if (doc.uploader.id) uploaderId = String(doc.uploader.id);
                                    else if (doc.uploader.toString) uploaderId = String(doc.uploader);
                                }

                                const uploaderName = doc.uploaderName || (doc.uploader && doc.uploader.name) || null;

                                if (currentUserId && uploaderId && String(uploaderId) === String(currentUserId)) return true;
                                if (currentUserName && uploaderName && uploaderName === currentUserName) return true;
                                return false;
                            });

                            setUploadedFiles(filtered);
                        } else {
                            setUploadedFiles([]);
                        }
                    setLoading(false);
                } catch (error) {
                    console.error('Error fetching files:', error);
                    setUploadedFiles([]);
                    setLoading(false);
                }
            };

            const formatTime = (totalSeconds) => {
                const h = Math.floor(totalSeconds / 3600);
                const m = Math.floor((totalSeconds - h * 3600) / 60);
                const s = totalSeconds - h * 3600 - m * 60;
                return `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            };

            const formatFileSize = (bytes) => {
                if (bytes === 0) return '0 B';
                const k = 1024;
                const sizes = ['B', 'KB', 'MB', 'GB'];
                const i = Math.floor(Math.log(bytes) / Math.log(k));
                return Math.round(bytes / Math.pow(k, i) * 100) / 100 + ' ' + sizes[i];
            };

            const getTypeColor = (type) => {
                switch(type) {
                    case 'Notes': return 'badge-notes';
                    case 'Assignment': return 'badge-assignment';
                    case 'Question Paper': return 'badge-question';
                    case 'Lab Record': return 'badge-lab';
                    default: return 'badge-notes';
                }
            };

            const handleDownload = (doc) => {
                try {
                    const link = document.createElement('a');
                    link.href = doc.fileUrl;
                    link.download = doc.name;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);

                    // Log download
                    fetch(`${API_BASE}/documents/${doc._id}/download`, {
                        method: 'POST',
                        headers: { Authorization: `Bearer ${getToken()}` }
                    }).catch(err => console.error('Download logging error:', err));
                } catch (error) {
                    console.error('Download error:', error);
                    window.open(doc.fileUrl, '_blank');
                }
            };

            const handleLogout = () => {
                sessionStorage.clear();
                window.location.href = 'auth.html';
            };

            return (
                <div className="app-container">
                    
                    <div className="sidebar">
                        <div className="brand">StudentHub</div>
                        
                        <a href="dashboard.html" className="nav-item">
                            <span>🏠</span> Dashboard Home
                        </a>
                        
                        <a href="resources.html" className="nav-item">
                            <span>📄</span> Documents
                        </a>
                        
                        <a href="chat.html" className="nav-item">
                            <span>💬</span> Group Chats
                        </a>

                        <a href="learning_hub.html" className="nav-item">
                            <span>🧠</span> Learning Hub
                        </a>

                        <a href="feedback.html" className="nav-item">
                            <span>⭐</span> Feedback & Ratings
                        </a>

                        <div className="nav-item active">
                            <span>👤</span> My Profile
                        </div>

                        <div className="nav-item" onClick={handleLogout} style={{marginTop:'20px'}}>
                            <span>🚪</span> Logout
                        </div>

                        <div className="session-card">
                            <small style={{color:'var(--accent)'}}>Current Session</small>
                            <div style={{fontSize:'1.2rem', fontWeight:'bold', fontFamily:'monospace'}}>
                                {formatTime(currentSessionTime)}
                            </div>
                            <small style={{color:'var(--text-muted)', marginTop:'8px', display:'block'}}>Total: {formatTime(totalTimeSpent)}</small>
                        </div>
                    </div>

                    <div className="main-content">
                        
                        <div className="header">
                            <h2>My Profile</h2>
                            <div style={{color:'var(--text-muted)'}}>View your stats and uploaded documents</div>
                        </div>

                        <div className="content-scroll">
                            
                            <div className="profile-header">
                                <div className="profile-avatar">{user.charAt(0).toUpperCase()}</div>
                                <div className="profile-info">
                                    <h2>{user}</h2>
                                    <p>{localStorage.getItem('email') || 'student@example.com'}</p>
                                    <div className="profile-meta">
                                        <div className="meta-item">📅 Joined: Jan 2026</div>
                                        <div className="meta-item">📊 Documents: {uploadedFiles.length}</div>
                                    </div>
                                </div>
                            </div>

                            <div className="stats-grid">
                                <div className="stat-card">
                                    <div className="stat-icon">⏱️</div>
                                    <div className="stat-value">{Math.floor(totalTimeSpent / 3600)}</div>
                                    <div className="stat-label">Total Hours Spent</div>
                                </div>
                                <div className="stat-card">
                                    <div className="stat-icon">📈</div>
                                    <div className="stat-value">{formatTime(currentSessionTime)}</div>
                                    <div className="stat-label">Current Session</div>
                                </div>
                                <div className="stat-card">
                                    <div className="stat-icon">📤</div>
                                    <div className="stat-value">{uploadedFiles.length}</div>
                                    <div className="stat-label">Files Uploaded</div>
                                </div>
                            </div>

                            <div className="files-section">
                                <div className="section-header">
                                    <h3>📂 Your Uploaded Files</h3>
                                    <span style={{color:'var(--text-muted)', fontSize:'0.9rem'}}>{uploadedFiles.length} files</span>
                                </div>

                                {loading ? (
                                    <div className="empty-state">
                                        <div className="empty-state-icon">⏳</div>
                                        <h4>Loading files...</h4>
                                    </div>
                                ) : uploadedFiles.length === 0 ? (
                                    <div className="empty-state">
                                        <div className="empty-state-icon">📭</div>
                                        <h4>No Files Uploaded Yet</h4>
                                        <p>Upload documents to share with other students</p>
                                    </div>
                                ) : (
                                    <table className="files-table">
                                        <thead>
                                            <tr>
                                                <th>File Name</th>
                                                <th>Type</th>
                                                <th>Size</th>
                                                <th>Subject</th>
                                                <th>Date</th>
                                                <th>Action</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {uploadedFiles.map((file, idx) => (
                                                <tr key={idx}>
                                                    <td className="file-name">{file.name}</td>
                                                    <td><span className={`badge ${getTypeColor(file.type)}`}>{file.type}</span></td>
                                                    <td className="file-size">{formatFileSize(file.fileSize || 0)}</td>
                                                    <td>{file.subject}</td>
                                                    <td className="file-date">{new Date(file.uploadedAt).toLocaleDateString()}</td>
                                                    <td>
                                                        <button 
                                                            className="download-btn" 
                                                            onClick={() => handleDownload(file)}
                                                            title="Download document"
                                                        >
                                                            ⬇️ Download
                                                        </button>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                )}
                            </div>

                        </div>
                    </div>

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

    <script>
      // Try server-side templating first (replace {{email}} on server).
      // Fallback: use window.currentUser or fetch /api/me
      (function() {
        const emailEl = document.getElementById('student-email');
        if (emailEl && emailEl.textContent.trim()) return; // already rendered by server

        const user = window.currentUser || null;
        if (user && user.email) {
          emailEl.textContent = user.email;
          return;
        }

        fetch('/api/me', { credentials: 'include' })
          .then(res => res.ok ? res.json() : Promise.reject())
          .then(data => { if (data && data.email) emailEl.textContent = data.email; })
          .catch(() => { /* ignore silently */ });
      })();
    </script>
</body>
</html>
