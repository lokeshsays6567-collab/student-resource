<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning Hub - Personalized Suggestions</title>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* --- PRO THEME: "LUMINOUS DASHBOARD" --- */
        :root {
            --bg-body: #0f172a;
            --bg-panel: #1e293b;
            --bg-card: #334155;
            
            --primary: #8b5cf6; /* Violet */
            --primary-glow: rgba(139, 92, 246, 0.5);
            --accent: #06b6d4; /* Cyan */
            
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            
            --glass: rgba(30, 41, 59, 0.7);
            --border: 1px solid rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; outline: none; scrollbar-width: thin; }

        body {
            margin: 0;
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* --- LAYOUT --- */
        .app-container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 280px;
            background: var(--bg-panel);
            border-right: var(--border);
            display: flex; flex-direction: column;
            padding: 25px;
            flex-shrink: 0;
        }

        .brand {
            font-size: 1.5rem; font-weight: 700; 
            background: linear-gradient(to right, var(--primary), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 40px;
        }

        .nav-item {
            padding: 12px 16px; margin-bottom: 8px;
            border-radius: 12px; color: var(--text-muted);
            cursor: pointer; font-weight: 500;
            transition: 0.3s; display: flex; align-items: center; gap: 12px;
        }
        .nav-item:hover { background: rgba(255,255,255,0.05); color: white; }
        .nav-item.active { background: var(--primary); color: white; box-shadow: 0 4px 15px var(--primary-glow); }

        /* --- MAIN AREA --- */
        .main-content {
            flex: 1;
            display: flex; flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* Top Header with Search */
        .header {
            padding: 30px 40px;
            display: flex; justify-content: space-between; align-items: center;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-bottom: var(--border);
            z-index: 10;
        }

        .search-bar {
            position: relative;
            width: 400px;
        }
        .search-input {
            width: 100%;
            background: var(--bg-body);
            border: var(--border);
            padding: 14px 20px 14px 45px;
            border-radius: 30px;
            color: white; font-size: 1rem;
            transition: 0.3s;
        }
        .search-input:focus { border-color: var(--primary); box-shadow: 0 0 0 2px var(--primary-glow); }
        .search-icon { position: absolute; left: 15px; top: 15px; color: var(--text-muted); }

        /* Scrollable Content */
        .content-scroll {
            padding: 40px;
            overflow-y: auto;
            flex: 1;
        }

        /* --- SECTIONS --- */
        h2 { font-size: 1.5rem; margin-bottom: 20px; font-weight: 600; }

        /* Activity Tracker */
        .activity-panel {
            background: linear-gradient(145deg, var(--bg-panel), #161e2e);
            padding: 25px; border-radius: 20px;
            border: var(--border);
            margin-bottom: 40px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .activity-stat { text-align: center; }
        .stat-val { font-size: 2rem; font-weight: 700; color: var(--accent); }
        .stat-label { font-size: 0.9rem; color: var(--text-muted); }
        
        /* Heatmap Mockup */
        .heatmap { display: flex; gap: 6px; }
        .heat-col { display: flex; flex-direction: column; gap: 6px; }
        .heat-cell { width: 12px; height: 12px; border-radius: 3px; background: #334155; }
        .heat-cell.low { background: #1e3a8a; }
        .heat-cell.med { background: #3b82f6; }
        .heat-cell.high { background: #60a5fa; }

        /* --- VIDEO GRID --- */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .video-card {
            background: var(--bg-panel);
            border-radius: 16px;
            overflow: hidden;
            border: var(--border);
            transition: 0.3s;
            cursor: pointer;
            position: relative;
        }
        .video-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.3); border-color: var(--primary); }

        .thumbnail-wrapper {
            position: relative;
            height: 160px;
            background: #000;
            overflow: hidden;
        }
        .thumbnail-img { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; transition: 0.3s; }
        .video-card:hover .thumbnail-img { opacity: 1; transform: scale(1.05); }
        
        .play-btn {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; transition: 0.3s;
            background: rgba(0,0,0,0.3);
        }
        .video-card:hover .play-btn { opacity: 1; }
        .play-icon { font-size: 3rem; color: white; filter: drop-shadow(0 2px 5px rgba(0,0,0,0.5)); }

        .card-body { padding: 15px; }
        .tag { 
            font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; font-weight: 700;
            color: var(--accent); margin-bottom: 5px; display: block;
        }
        .video-title { font-size: 1rem; font-weight: 600; line-height: 1.4; margin-bottom: 8px; }
        .video-meta { font-size: 0.8rem; color: var(--text-muted); display: flex; justify-content: space-between; }

        /* --- TOPIC TABS --- */
        .tabs { display: flex; gap: 15px; margin-bottom: 25px; overflow-x: auto; padding-bottom: 5px; }
        .tab {
            padding: 8px 20px; border-radius: 20px;
            background: var(--bg-panel); border: var(--border);
            color: var(--text-muted); cursor: pointer; white-space: nowrap; transition: 0.2s;
        }
        .tab:hover { color: white; border-color: var(--text-muted); }
        .tab.active { background: var(--primary); color: white; border-color: var(--primary); }

    </style>
</head>
<body>
    <div id="root"></div>

    <script src="activity.js"></script>
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const API_BASE = 'http://localhost:5000/api';

        const getToken = () => localStorage.getItem('token');

        // --- MOCK DATABASE OF VIDEOS ---
        // In a real app, this would come from the YouTube Data API
        const VIDEO_DB = [
            { id: 1, title: "Python for Beginners - Full Course", channel: "ProgrammingHub", views: "1.2M", time: "4:30:00", category: "Python", img: "https://img.youtube.com/vi/_uQrJ0TkZlc/hqdefault.jpg" },
            { id: 2, title: "Master HTML5 in 2026", channel: "WebDev Pro", views: "450K", time: "1:15:20", category: "HTML", img: "https://img.youtube.com/vi/pQN-pnXPaVg/hqdefault.jpg" },
            { id: 3, title: "CSS Flexbox & Grid Explained", channel: "DesignMaster", views: "890K", time: "45:10", category: "CSS", img: "https://img.youtube.com/vi/3YMfiooygTA/hqdefault.jpg" },
            { id: 4, title: "Calculus 1 - Limits & Continuity", channel: "Academic Minds", views: "2.1M", time: "12:05", category: "Subject", img: "https://img.youtube.com/vi/7K1sB05pEkw/hqdefault.jpg" },
            { id: 5, title: "Advanced Python: Decorators", channel: "PyExpert", views: "120K", time: "22:15", category: "Python", img: "https://img.youtube.com/vi/FsAPt_9Bf3U/hqdefault.jpg" },
            { id: 6, title: "Responsive Web Design Tutorial", channel: "WebDev Pro", views: "300K", time: "55:00", category: "CSS", img: "https://img.youtube.com/vi/srvsPop4n6M/hqdefault.jpg" },
            { id: 7, title: "Physics: Newton's Laws", channel: "Science Explained", views: "1.5M", time: "18:30", category: "Subject", img: "https://img.youtube.com/vi/kKKM8Y-u7ds/hqdefault.jpg" },
            { id: 8, title: "Build a Portfolio Website", channel: "CodeCreate", views: "67K", time: "2:10:00", category: "HTML", img: "https://img.youtube.com/vi/G3e-cpL7ofc/hqdefault.jpg" },
        ];

        const App = () => {
            const [searchQuery, setSearchQuery] = useState("");
            const [activeCategory, setActiveCategory] = useState("All");
            const [recentActivity, setRecentActivity] = useState(0); // Minutes tracked
            const [user, setUser] = useState(() => localStorage.getItem('user') || localStorage.getItem('username') || 'Student');
            const [videos, setVideos] = useState(VIDEO_DB);
            const [showReferralModal, setShowReferralModal] = useState(false);
            const [newVideo, setNewVideo] = useState({ title: '', url: '', category: 'Python', rating: 5 });
            const [userReferrals, setUserReferrals] = useState({});

            // Simulate Tracking Activity
            useEffect(() => {
                const savedUser = localStorage.getItem('user');
                if(savedUser) setUser(savedUser);

                // Initialize activity tracking
                activityTracker.startTracking('learning_hub');

                const savedTime = sessionStorage.getItem('timeSpent');
                if(savedTime) setRecentActivity(Math.floor(parseInt(savedTime)/60));

                // Load saved referrals from localStorage and add to videos
                const savedReferralsData = localStorage.getItem('videoReferralsData');
                if(savedReferralsData) {
                    const referredVideos = JSON.parse(savedReferralsData);
                    setVideos(prev => [...prev, ...referredVideos]);
                }

                const savedReferrals = JSON.parse(localStorage.getItem('videoReferrals') || '{}');
                setUserReferrals(savedReferrals);

                const interval = setInterval(() => {
                    setRecentActivity(prev => prev + 1);
                }, 60000); // Add 1 min every 60s (mock)

                return () => clearInterval(interval);
            }, []);

            // Filtering Logic
            const filteredVideos = useMemo(() => {
                return videos.filter(video => {
                    const matchesSearch = video.title.toLowerCase().includes(searchQuery.toLowerCase()) || 
                                          video.category.toLowerCase().includes(searchQuery.toLowerCase());
                    const matchesCategory = activeCategory === "All" || video.category === activeCategory;
                    return matchesSearch && matchesCategory;
                });
            }, [searchQuery, activeCategory, videos]);

            const handleAddVideo = () => {
                if (!newVideo.title || !newVideo.url) {
                    alert('Please fill all fields');
                    return;
                }

                // Extract video ID from YouTube URL
                let videoId = '';
                if (newVideo.url.includes('youtube.com/watch?v=')) {
                    videoId = newVideo.url.split('v=')[1];
                } else if (newVideo.url.includes('youtu.be/')) {
                    videoId = newVideo.url.split('youtu.be/')[1];
                } else {
                    alert('Invalid YouTube URL');
                    return;
                }

                const video = {
                    id: Date.now(),
                    title: newVideo.title,
                    channel: user,
                    views: '1',
                    time: '0:00',
                    category: newVideo.category,
                    img: `https://img.youtube.com/vi/${videoId}/hqdefault.jpg`,
                    url: newVideo.url,
                    rating: newVideo.rating,
                    referred_by: user,
                    isReferral: true
                };

                setVideos([...videos, video]);
                setUserReferrals({ ...userReferrals, [video.id]: user });
                
                // Save referrals to localStorage - both mapping and full data
                const allReferrals = JSON.parse(localStorage.getItem('videoReferrals') || '{}');
                allReferrals[video.id] = user;
                localStorage.setItem('videoReferrals', JSON.stringify(allReferrals));

                // Save full video data to localStorage
                const allReferralVideos = JSON.parse(localStorage.getItem('videoReferralsData') || '[]');
                allReferralVideos.push(video);
                localStorage.setItem('videoReferralsData', JSON.stringify(allReferralVideos));

                setShowReferralModal(false);
                setNewVideo({ title: '', url: '', category: 'Python', rating: 5 });
                alert('Video referred successfully!');
            };

            const handleLogout = () => {
                sessionStorage.clear();
                localStorage.clear();
                window.location.href = 'auth.html';
            };

            return (
                <div className="app-container">
                    
                    {/* SIDEBAR */}
                    <div className="sidebar">
                        <div className="brand">StudentHub</div>
                        
                        <div className="nav-item" onClick={() => window.location.href='dashboard.html'}>
                            <span>🏠</span> Dashboard
                        </div>
                        <div className="nav-item" onClick={() => window.location.href='chat.html'}>
                            <span>💬</span> Groups
                        </div>
                        <div className="nav-item active">
                            <span>🧠</span> Learning Hub
                        </div>
                        <div className="nav-item" onClick={handleLogout}>
                            <span>🚪</span> Logout
                        </div>

                        <a href="profile.html" className="nav-item">
                            <span>👤</span> My Profile
                        </a>

                        <div style={{marginTop: 'auto', padding: '15px', background: 'rgba(255,255,255,0.05)', borderRadius: '12px'}}>
                            <small style={{color:'var(--accent)'}}>Current Session</small>
                            <div style={{fontSize:'1.2rem', fontWeight:'bold'}}>{recentActivity} mins</div>
                            <small style={{color:'var(--text-muted)'}}>Learning Activity</small>
                        </div>
                    </div>

                    {/* MAIN CONTENT */}
                    <div className="main-content">
                        
                        {/* Header */}
                        <div className="header">
                            <div>
                                <h1 style={{margin:0, fontSize:'1.2rem'}}>Discover Resources</h1>
                                <small style={{color:'var(--text-muted)'}}>Based on your recent activity</small>
                            </div>
                            <div className="search-bar">
                                <span className="search-icon">🔍</span>
                                <input 
                                    type="text" 
                                    className="search-input" 
                                    placeholder="Search Python, CSS, History..." 
                                    value={searchQuery}
                                    onChange={(e) => setSearchQuery(e.target.value)}
                                />
                            </div>
                        </div>

                        {/* Scroll Area */}
                        <div className="content-scroll">
                            
                            {/* Analytics Panel */}
                            <div className="activity-panel">
                                <div className="activity-stat">
                                    <div className="stat-val">12</div>
                                    <div className="stat-label">Videos Watched</div>
                                </div>
                                <div className="activity-stat">
                                    <div className="stat-val">4.5h</div>
                                    <div className="stat-label">Study Time</div>
                                </div>
                                <div style={{flex:1, marginLeft:'40px'}}>
                                    <div style={{marginBottom:'10px', fontSize:'0.9rem', color:'var(--text-muted)'}}>Weekly Activity Map</div>
                                    <div className="heatmap">
                                        {[...Array(14)].map((_, i) => (
                                            <div key={i} className="heat-col">
                                                <div className={`heat-cell ${i%2===0?'high':'low'}`}></div>
                                                <div className={`heat-cell ${i%3===0?'med':'low'}`}></div>
                                                <div className={`heat-cell ${i%4===0?'high':'med'}`}></div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>

                            {/* Referred Videos Section */}
                            {videos.filter(v => v.isReferral).length > 0 && (
                                <div style={{marginBottom:'40px'}}>
                                    <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'20px'}}>
                                        <h2>⭐ Community Referrals</h2>
                                    </div>
                                    <div className="grid-container">
                                        {videos.filter(v => v.isReferral).map(video => (
                                            <div key={video.id} className="video-card" onClick={() => {
                                                let videoId = '';
                                                if (video.url) {
                                                    if (video.url.includes('youtube.com/watch?v=')) {
                                                        videoId = video.url.split('v=')[1].split('&')[0];
                                                    } else if (video.url.includes('youtu.be/')) {
                                                        videoId = video.url.split('youtu.be/')[1].split('?')[0];
                                                    }
                                                }
                                                if (videoId) {
                                                    window.open(`https://www.youtube.com/watch?v=${videoId}`, '_blank');
                                                } else {
                                                    alert('Video URL not available');
                                                }
                                            }}>
                                                <div className="thumbnail-wrapper">
                                                    <img src={video.img} alt={video.title} className="thumbnail-img" />
                                                    <div className="play-btn"><span className="play-icon">▶</span></div>
                                                    <div style={{position:'absolute', top:'10px', right:'10px', background:'#10b981', color:'white', padding:'4px 10px', borderRadius:'6px', fontSize:'0.75rem', fontWeight:'600'}}>⭐ REFERRED</div>
                                                </div>
                                                <div className="card-body">
                                                    <span className="tag">{video.category}</span>
                                                    <div className="video-title">{video.title}</div>
                                                    <div className="video-meta">
                                                        <span>{video.channel}</span>
                                                        <span>{video.views} • {video.time}</span>
                                                    </div>
                                                    <div style={{marginTop:'8px', fontSize:'0.85rem', color:'var(--accent)'}}>
                                                        Referred by: {video.referred_by} ⭐ {video.rating}/5
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* Recommendations */}
                            <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'20px'}}>
                                <h2>Recommended For You</h2>
                                <button onClick={() => setShowReferralModal(true)} style={{background:'linear-gradient(135deg, #8b5cf6, #06b6d4)', color:'white', border:'none', padding:'10px 20px', borderRadius:'8px', cursor:'pointer', fontWeight:'600'}}>
                                    ➕ Refer Video
                                </button>
                            </div>
                            
                            {/* Categories */}
                            <div className="tabs">
                                {["All", "Python", "HTML", "CSS", "Subject"].map(cat => (
                                    <div 
                                        key={cat} 
                                        className={`tab ${activeCategory === cat ? 'active' : ''}`}
                                        onClick={() => setActiveCategory(cat)}
                                    >
                                        {cat}
                                    </div>
                                ))}
                            </div>

                            {/* Video Grid */}
                            <div className="grid-container">
                                {filteredVideos.length > 0 ? (
                                    filteredVideos.map(video => (
                                        <div key={video.id} className="video-card" onClick={() => {
                                            let videoId = '';
                                            if (video.url) {
                                                if (video.url.includes('youtube.com/watch?v=')) {
                                                    videoId = video.url.split('v=')[1].split('&')[0];
                                                } else if (video.url.includes('youtu.be/')) {
                                                    videoId = video.url.split('youtu.be/')[1].split('?')[0];
                                                }
                                            }
                                            if (videoId) {
                                                window.open(`https://www.youtube.com/watch?v=${videoId}`, '_blank');
                                            } else {
                                                alert('Video URL not available');
                                            }
                                        }}>
                                            <div className="thumbnail-wrapper">
                                                <img src={video.img} alt={video.title} className="thumbnail-img" />
                                                <div className="play-btn"><span className="play-icon">▶</span></div>
                                                {video.isReferral && <div style={{position:'absolute', top:'10px', right:'10px', background:'#10b981', color:'white', padding:'4px 10px', borderRadius:'6px', fontSize:'0.75rem', fontWeight:'600'}}>⭐ REFERRED</div>}
                                            </div>
                                            <div className="card-body">
                                                <span className="tag">{video.category}</span>
                                                <div className="video-title">{video.title}</div>
                                                <div className="video-meta">
                                                    <span>{video.channel}</span>
                                                    <span>{video.views} • {video.time}</span>
                                                </div>
                                                {video.isReferral && (
                                                    <div style={{marginTop:'8px', fontSize:'0.85rem', color:'var(--accent)'}}>
                                                        Referred by: {video.referred_by} ⭐ {video.rating}/5
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    ))
                                ) : (
                                    <div style={{gridColumn:'1/-1', textAlign:'center', padding:'50px', color:'var(--text-muted)'}}>
                                        <h3>No results found for "{searchQuery}"</h3>
                                        <p>Try searching for Python, HTML, or Subjects.</p>
                                    </div>
                                )}
                            </div>

                        </div>
                    </div>

                    {/* Referral Modal */}
                    {showReferralModal && (
                        <div style={{position:'fixed', inset:0, background:'rgba(0,0,0,0.7)', display:'flex', alignItems:'center', justifyContent:'center', zIndex:1000}}>
                            <div style={{background:'var(--bg-panel)', padding:'30px', borderRadius:'16px', width:'90%', maxWidth:'500px', border:'var(--border)'}}>
                                <h2 style={{margin:'0 0 20px 0', color:'white'}}>📺 Refer a YouTube Video</h2>
                                
                                <input 
                                    type="text" 
                                    placeholder="Video Title (e.g., Python Basics Tutorial)"
                                    value={newVideo.title}
                                    onChange={(e) => setNewVideo({...newVideo, title: e.target.value})}
                                    style={{width:'100%', padding:'12px', marginBottom:'15px', background:'var(--bg-body)', border:'var(--border)', borderRadius:'8px', color:'white', fontSize:'1rem'}}
                                />

                                <input 
                                    type="text" 
                                    placeholder="YouTube URL (e.g., https://youtu.be/xxx or https://youtube.com/watch?v=xxx)"
                                    value={newVideo.url}
                                    onChange={(e) => setNewVideo({...newVideo, url: e.target.value})}
                                    style={{width:'100%', padding:'12px', marginBottom:'15px', background:'var(--bg-body)', border:'var(--border)', borderRadius:'8px', color:'white', fontSize:'1rem'}}
                                />

                                <label style={{color:'var(--text-muted)', display:'block', marginBottom:'8px'}}>Category</label>
                                <select 
                                    value={newVideo.category}
                                    onChange={(e) => setNewVideo({...newVideo, category: e.target.value})}
                                    style={{width:'100%', padding:'12px', marginBottom:'15px', background:'var(--bg-body)', border:'var(--border)', borderRadius:'8px', color:'white', fontSize:'1rem'}}
                                >
                                    <option value="Python">Python</option>
                                    <option value="HTML">HTML</option>
                                    <option value="CSS">CSS</option>
                                    <option value="JavaScript">JavaScript</option>
                                    <option value="Subject">Subject</option>
                                    <option value="Other">Other</option>
                                </select>

                                <label style={{color:'var(--text-muted)', display:'block', marginBottom:'8px'}}>Your Rating (1-5)</label>
                                <div style={{display:'flex', gap:'10px', marginBottom:'20px'}}>
                                    {[1,2,3,4,5].map(star => (
                                        <span 
                                            key={star} 
                                            onClick={() => setNewVideo({...newVideo, rating: star})}
                                            style={{fontSize:'2rem', cursor:'pointer', color: star <= newVideo.rating ? '#f59e0b' : '#64748b'}}
                                        >
                                            ★
                                        </span>
                                    ))}
                                </div>

                                <div style={{display:'flex', gap:'10px', justifyContent:'flex-end'}}>
                                    <button 
                                        onClick={() => setShowReferralModal(false)}
                                        style={{padding:'10px 20px', background:'rgba(255,255,255,0.1)', border:'var(--border)', borderRadius:'8px', color:'white', cursor:'pointer', fontWeight:'600'}}
                                    >
                                        Cancel
                                    </button>
                                    <button 
                                        onClick={handleAddVideo}
                                        style={{padding:'10px 20px', background:'var(--primary)', border:'none', borderRadius:'8px', color:'white', cursor:'pointer', fontWeight:'600'}}
                                    >
                                        Refer Video
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
