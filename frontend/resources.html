<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Documents - Pro</title>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* --- THEME: LUMINOUS DASHBOARD (MATCHING DASHBOARD.HTML) --- */
        :root {
            --bg-body: #0f172a;
            --bg-panel: #1e293b;
            --bg-card: #334155;
            
            --primary: #8b5cf6; /* Violet */
            --primary-hover: #7c3aed;
            --primary-glow: rgba(139, 92, 246, 0.5);
            --accent: #06b6d4; /* Cyan */
            
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            
            --glass: rgba(30, 41, 59, 0.7);
            --border: 1px solid rgba(255, 255, 255, 0.1);
            
            --success: #10b981;
        }

        * { box-sizing: border-box; outline: none; scrollbar-width: thin; }

        html, body {
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            height: 100vh;
            width: 100vw;
            overflow: hidden; /* Lock window scroll for proper framing */
        }

        #root {
            width: 100%;
            height: 100%;
        }

        /* --- LAYOUT --- */
        .app-container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 280px;
            background: var(--bg-panel);
            border-right: var(--border);
            display: flex; flex-direction: column;
            padding: 25px;
            flex-shrink: 0;
            height: 100%;
            overflow-y: auto;
        }

        .brand {
            font-size: 1.5rem; font-weight: 700; 
            background: linear-gradient(to right, var(--primary), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 40px;
            flex-shrink: 0;
        }

        .nav-item {
            padding: 12px 16px; margin-bottom: 8px;
            border-radius: 12px; color: var(--text-muted);
            cursor: pointer; font-weight: 500;
            transition: 0.3s; display: flex; align-items: center; gap: 12px;
            text-decoration: none;
        }
        .nav-item:hover { background: rgba(255,255,255,0.05); color: white; }
        .nav-item.active { background: var(--primary); color: white; box-shadow: 0 4px 15px var(--primary-glow); }

        .session-card {
            margin-top: auto; padding: 15px; 
            background: rgba(255,255,255,0.05); 
            border-radius: 12px; border: var(--border);
            flex-shrink: 0;
        }

        /* --- MAIN AREA --- */
        .main-content {
            flex: 1;
            display: flex; flex-direction: column;
            overflow: hidden;
            position: relative;
            background: radial-gradient(circle at top right, #1e1b4b, transparent);
            height: 100%;
        }

        /* Top Header */
        .header {
            padding: 20px 40px;
            display: flex; justify-content: space-between; align-items: center;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-bottom: var(--border);
            z-index: 10;
            flex-shrink: 0;
            height: 80px;
        }
        .header h2 { margin: 0; font-size: 1.5rem; }

        /* Scrollable Content Area */
        .content-scroll {
            padding: 40px;
            overflow-y: auto;
            flex: 1;
            width: 100%;
        }

        /* --- UPLOAD SECTION --- */
        .upload-card {
            background: linear-gradient(145deg, var(--bg-panel), #161e2e);
            padding: 30px; border-radius: 20px;
            border: var(--border);
            margin-bottom: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .upload-card h3 { margin-top: 0; margin-bottom: 25px; font-size: 1.2rem; color: white; }

        .form-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
        }
        .form-group { display: flex; flex-direction: column; gap: 8px; }
        .form-group.full { grid-column: span 2; }
        
        label { font-size: 0.85rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .form-input, .form-select, .form-textarea {
            background: var(--bg-body);
            border: var(--border);
            padding: 12px 16px; border-radius: 10px;
            color: white; font-size: 1rem; font-family: inherit;
            transition: 0.3s;
        }
        .form-input:focus, .form-select:focus, .form-textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px var(--primary-glow);
        }
        .form-textarea { resize: vertical; min-height: 80px; }

        /* Custom File Input */
        .file-upload-wrapper {
            position: relative;
            background: rgba(255,255,255,0.05);
            border: 2px dashed rgba(255,255,255,0.2);
            border-radius: 10px;
            padding: 30px;
            text-align: center;
            transition: 0.3s;
            cursor: pointer;
        }
        .file-upload-wrapper:hover { border-color: var(--primary); background: rgba(139, 92, 246, 0.1); }
        .file-input {
            position: absolute; inset: 0; opacity: 0; cursor: pointer;
        }
        .file-label { pointer-events: none; color: var(--text-muted); }
        .file-label span { color: var(--primary); font-weight: bold; }

        .submit-btn {
            background: var(--primary); color: white;
            border: none; padding: 14px 28px; border-radius: 12px;
            font-size: 1rem; font-weight: 600; cursor: pointer;
            margin-top: 25px; width: 100%;
            transition: 0.3s;
            box-shadow: 0 4px 15px var(--primary-glow);
        }
        .submit-btn:hover { background: var(--primary-hover); transform: translateY(-2px); }

        /* --- DOCUMENT LIST --- */
        .doc-list-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px;
        }
        .doc-list-header h3 { margin: 0; font-size: 1.2rem; }

        .doc-card {
            background: var(--bg-panel);
            border: var(--border);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 15px;
            display: flex; justify-content: space-between; align-items: center;
            transition: 0.3s;
            animation: fadeIn 0.4s ease-out;
        }
        .doc-card:hover { transform: translateX(5px); border-color: var(--primary); }

        .doc-info h4 { margin: 0 0 8px 0; font-size: 1.1rem; color: white; }
        .doc-meta { display: flex; gap: 10px; align-items: center; font-size: 0.85rem; color: var(--text-muted); }
        
        .badge {
            padding: 4px 10px; border-radius: 6px;
            font-size: 0.75rem; font-weight: 700; text-transform: uppercase;
        }
        .badge-purple { background: rgba(139, 92, 246, 0.2); color: #c4b5fd; }
        .badge-blue { background: rgba(6, 182, 212, 0.2); color: #67e8f9; }
        .badge-gray { background: rgba(148, 163, 184, 0.2); color: #cbd5e1; }

        .download-btn {
            background: transparent; border: 1px solid var(--accent);
            color: var(--accent); padding: 8px 16px; border-radius: 8px;
            cursor: pointer; transition: 0.2s; font-weight: 600; text-decoration: none;
            display: inline-flex; align-items: center; gap: 5px;
        }
        .download-btn:hover { background: var(--accent); color: #000; }

        /* Feedback Section */
        .feedback-section {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .rating-section {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .star-rating {
            display: flex;
            gap: 5px;
            font-size: 1.5rem;
            cursor: pointer;
        }

        .star {
            color: #cbd5e1;
            transition: 0.2s;
        }

        .star:hover,
        .star.filled {
            color: #f59e0b;
            transform: scale(1.2);
        }

        .feedback-input-group {
            display: flex;
            gap: 8px;
            align-items: flex-start;
        }

        .feedback-textarea {
            flex: 1;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 8px 12px;
            border-radius: 8px;
            color: white;
            font-family: inherit;
            font-size: 0.85rem;
            resize: vertical;
            min-height: 40px;
            max-height: 80px;
        }

        .feedback-textarea::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .feedback-textarea:focus {
            border-color: var(--primary);
            outline: none;
        }

        .feedback-submit {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: 0.2s;
            white-space: nowrap;
        }

        .feedback-submit:hover {
            background: var(--primary-hover);
        }

        /* --- PREVIEW MODAL --- */
        .preview-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .preview-modal.active {
            display: flex;
        }

        .preview-container {
            background: var(--bg-panel);
            border-radius: 16px;
            border: var(--border);
            width: 90%;
            height: 90%;
            max-width: 1000px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .preview-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
            border-bottom: var(--border);
            flex-shrink: 0;
        }

        .preview-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: white;
            margin: 0;
        }

        .preview-close-btn {
            background: none;
            border: none;
            font-size: 2rem;
            color: var(--text-muted);
            cursor: pointer;
            transition: 0.2s;
            padding: 0;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .preview-close-btn:hover {
            color: white;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
        }

        .preview-content {
            flex: 1;
            overflow: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.3);
            padding: 20px;
        }

        .preview-image {
            max-width: 100%;
            max-height: 100%;
            border-radius: 8px;
        }

        .preview-pdf, .preview-text {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 8px;
        }

        .preview-unsupported {
            text-align: center;
            color: var(--text-muted);
        }

        .preview-unsupported h3 {
            margin: 0 0 10px 0;
            color: white;
        }

        .preview-unsupported p {
            margin: 5px 0;
        }

        .download-preview-btn {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
            margin-top: 15px;
        }

        .download-preview-btn:hover {
            background: #06b6d4;
            transform: translateY(-2px);
        }

        /* Action buttons container */
        .doc-actions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .preview-btn {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            transition: 0.2s;
        }

        .preview-btn:hover {
            background: #06b6d4;
            transform: translateY(-2px);
        }

        .download-btn {
            background: var(--primary);
        }

        .download-btn:hover {
            background: var(--primary-hover);
        }

        .delete-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            transition: 0.2s;
        }

        .delete-btn:hover {
            background: #dc2626;
            transform: translateY(-2px);
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    </style>
</head>
<body>
    <div id="root"></div>

    <script src="activity.js"></script>
    <script type="text/babel">
        const { useState, useEffect } = React;
        const API_BASE = 'http://localhost:5000/api';

        const getToken = () => localStorage.getItem('token');

        const App = () => {
            const [user, setUser] = useState("Student");
            const [docs, setDocs] = useState([]);
            const [loading, setLoading] = useState(true);
            const [timeSpent, setTimeSpent] = useState(0);
            const [ratings, setRatings] = useState({});
            const [feedbacks, setFeedbacks] = useState({});
            const [feedbackInput, setFeedbackInput] = useState({});
            const [previewDoc, setPreviewDoc] = useState(null);
            const [userFeedbackStatus, setUserFeedbackStatus] = useState({});
            
            const [formData, setFormData] = useState({
                name: "",
                subject: "",
                docClass: "",
                type: "Notes",
                desc: "",
                file: null
            });

            useEffect(() => {
                const savedUser = localStorage.getItem('user');
                if(savedUser) setUser(savedUser);

                const savedTime = sessionStorage.getItem('timeSpent');
                if(savedTime) setTimeSpent(parseInt(savedTime));

                // Initialize activity tracking
                activityTracker.startTracking('documents');

                // Fetch documents from backend
                fetchDocuments();

                const timer = setInterval(() => {
                    setTimeSpent(prev => {
                        const newVal = prev + 1;
                        sessionStorage.setItem('timeSpent', newVal);
                        return newVal;
                    });
                }, 1000);

                return () => clearInterval(timer);
            }, []);

            const handleSubmit = async () => {
                const { name, subject, docClass, type, desc, file } = formData;
                
                if(!name || !file) {
                    alert("Please provide a Document Name and select a File.");
                    return;
                }

                const formDataToSend = new FormData();
                formDataToSend.append('name', name);
                formDataToSend.append('subject', subject || 'General');
                formDataToSend.append('docClass', docClass || 'N/A');
                formDataToSend.append('type', type);
                formDataToSend.append('description', desc);
                formDataToSend.append('file', file);

                try {
                    const response = await fetch(`${API_BASE}/documents/upload`, {
                        method: 'POST',
                        headers: { Authorization: `Bearer ${getToken()}` },
                        body: formDataToSend
                    });

                    const result = await response.json();

                    if (!response.ok) {
                        throw new Error(result.error || 'Upload failed');
                    }

                    alert("Document Uploaded Successfully!");
                    fetchDocuments();
                    
                    setFormData({
                        name: "", subject: "", docClass: "", type: "Notes", desc: "", file: null
                    });

                    const fileInput = document.querySelector('input[type="file"]');
                    if (fileInput) fileInput.value = '';
                } catch (error) {
                    alert('Error: ' + error.message);
                }
            };

            const fetchDocuments = async () => {
                try {
                    const token = getToken();
                    const response = await fetch(`${API_BASE}/documents`, {
                        headers: { Authorization: `Bearer ${token}` }
                    });
                    
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    
                    const data = await response.json();
                    
                    if (!Array.isArray(data)) {
                        console.error('Invalid response format:', data);
                        setDocs([]);
                        setLoading(false);
                        return;
                    }
                    
                    console.log('Documents loaded:', data.length);
                    setDocs(data);
                    
                    // Fetch feedbacks for all documents
                    const feedbacksData = {};
                    const userStatusData = {};
                    
                    for (const doc of data) {
                        try {
                            // Get all feedbacks for this document
                            const feedbackRes = await fetch(`${API_BASE}/feedback/${doc._id}`, {
                                headers: { Authorization: `Bearer ${token}` }
                            });
                            const feedbackList = await feedbackRes.json();
                            feedbacksData[doc._id] = feedbackList;
                            
                            // Check if current user already gave feedback
                            const checkRes = await fetch(`${API_BASE}/feedback-check/${doc._id}`, {
                                headers: { Authorization: `Bearer ${token}` }
                            });
                            const checkData = await checkRes.json();
                            userStatusData[doc._id] = checkData.hasGivenFeedback;
                        } catch (error) {
                            console.error('Error fetching feedback:', error);
                        }
                    }
                    
                    setFeedbacks(feedbacksData);
                    setUserFeedbackStatus(userStatusData);
                    setLoading(false);
                } catch (error) {
                    console.error('Error fetching documents:', error);
                    setDocs([]);
                    setLoading(false);
                }
            };

            const handleDownload = (doc) => {
                if (!doc.fileUrl) {
                    alert("Download link not available.");
                    return;
                }
                
                try {
                    // Create a hidden anchor tag to trigger the download
                    const link = document.createElement('a');
                    link.href = doc.fileUrl;
                    // Attempt to set a filename, though cross-origin limitations might apply
                    link.setAttribute('download', doc.name || 'document');
                    link.style.display = 'none';
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);

                    // Log download event to the server
                    fetch(`${API_BASE}/documents/${doc._id}/download`, {
                        method: 'POST',
                        headers: { Authorization: `Bearer ${getToken()}` }
                    }).catch(err => console.error('Download logging error:', err));
                } catch (error) {
                    console.error('Download error:', error);
                    // Fallback to direct window open if programmatic click fails
                    window.open(doc.fileUrl, '_blank');
                }
            };

            const handlePreview = (doc) => {
                setPreviewDoc(doc);
            };

            const closePreview = () => {
                setPreviewDoc(null);
            };

            const handleDelete = async (docId, docName) => {
                if (!confirm(`Are you sure you want to delete "${docName}"? This action cannot be undone.`)) {
                    return;
                }

                try {
                    const response = await fetch(`${API_BASE}/documents/${docId}`, {
                        method: 'DELETE',
                        headers: { Authorization: `Bearer ${getToken()}` }
                    });

                    if (!response.ok) {
                        const errorData = await response.json();
                        alert("Error: " + (errorData.error || 'Failed to delete document'));
                        return;
                    }

                    alert("Document deleted successfully!");
                    fetchDocuments();
                } catch (error) {
                    console.error('Delete error:', error);
                    alert("Error deleting document: " + error.message);
                }
            };

            const getPreviewContent = (doc) => {
                if (!doc) return null;
                
                const previewUrl = `${API_BASE}/documents/${doc._id}/preview`;
                const fileExt = doc.fileName?.split('.').pop()?.toLowerCase();
                
                // Image preview
                if (['jpg', 'jpeg', 'png', 'gif', 'webp'].includes(fileExt)) {
                    return (
                        <img src={previewUrl} alt={doc.name} className="preview-image" />
                    );
                }
                
                // PDF preview
                if (fileExt === 'pdf') {
                    return (
                        <embed src={previewUrl} type="application/pdf" className="preview-pdf" />
                    );
                }
                
                // Text preview
                if (fileExt === 'txt') {
                    return (
                        <iframe src={previewUrl} className="preview-text" />
                    );
                }
                
                // Unsupported format
                return (
                    <div className="preview-unsupported">
                        <h3>Preview Not Available</h3>
                        <p>File format: {fileExt?.toUpperCase() || 'Unknown'}</p>
                        <p>This file type cannot be previewed in the browser.</p>
                        <button className="download-preview-btn" onClick={() => handleDownload(doc)}>
                            Download File Instead
                        </button>
                    </div>
                );
            };

            const handleLogout = () => {
                sessionStorage.clear();
                localStorage.clear();
                window.location.href = 'auth.html';
            };

            const handleInputChange = (e) => {
                const { name, value } = e.target;
                setFormData(prev => ({ ...prev, [name]: value }));
            };

            const handleFileChange = (e) => {
                setFormData(prev => ({ ...prev, file: e.target.files[0] }));
            };

            const formatTime = (totalSeconds) => {
                const h = Math.floor(totalSeconds / 3600);
                const m = Math.floor((totalSeconds - h * 3600) / 60);
                const s = totalSeconds - h * 3600 - m * 60;
                return `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            };

            const handleRating = (docId, star) => {
                setRatings(prev => ({ ...prev, [docId]: star }));
            };

            const handleFeedbackChange = (docId, text) => {
                setFeedbackInput(prev => ({ ...prev, [docId]: text }));
            };

            const submitFeedback = async (docId) => {
                const rating = ratings[docId];
                const feedback = feedbackInput[docId];

                if (!rating) {
                    alert("Please select a rating");
                    return;
                }

                try {
                    const response = await fetch(`${API_BASE}/feedback`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${getToken()}`
                        },
                        body: JSON.stringify({
                            resourceId: docId,
                            resourceType: 'Document',
                            rating: parseInt(rating),
                            feedback: feedback || ''
                        })
                    });

                    if (!response.ok) {
                        const errorData = await response.json();
                        alert("Error: " + (errorData.error || 'Failed to submit feedback'));
                        return;
                    }

                    alert("Thank you for your feedback!");
                    setRatings(prev => ({ ...prev, [docId]: 0 }));
                    setFeedbackInput(prev => ({ ...prev, [docId]: '' }));
                    setUserFeedbackStatus(prev => ({ ...prev, [docId]: true }));
                    
                    // Refresh feedbacks
                    const feedbackRes = await fetch(`${API_BASE}/feedback/${docId}`, {
                        headers: { Authorization: `Bearer ${getToken()}` }
                    });
                    const feedbackList = await feedbackRes.json();
                    setFeedbacks(prev => ({ ...prev, [docId]: feedbackList }));
                } catch (error) {
                    console.error('Feedback error:', error);
                    alert('Error submitting feedback: ' + error.message);
                }
            };

            return (
                <div className="app-container">
                    
                    {/* SIDEBAR */}
                    <div className="sidebar">
                        <div className="brand">StudentHub</div>
                        
                        <a href="dashboard.html" className="nav-item">
                            <span>🏠</span> Dashboard Home
                        </a>
                        
                        <div className="nav-item active">
                            <span>📄</span> Documents
                        </div>
                        
                        <a href="chat.html" className="nav-item">
                            <span>💬</span> Group Chats
                        </a>

                        <a href="learning_hub.html" className="nav-item">
                            <span>🧠</span> Learning Hub
                        </a>

                        <a href="profile.html" className="nav-item">
                            <span>👤</span> My Profile
                        </a>

                        <div className="nav-item" onClick={handleLogout} style={{marginTop: '20px'}}>
                            <span>🚪</span> Logout
                        </div>

                        <div className="session-card">
                            <small style={{color:'var(--accent)'}}>Current Session</small>
                            <div style={{fontSize:'1.2rem', fontWeight:'bold', fontFamily:'monospace'}}>
                                {formatTime(timeSpent)}
                            </div>
                            <small style={{color:'var(--text-muted)'}}>Logged in as {user}</small>
                        </div>
                    </div>

                    {/* MAIN CONTENT */}
                    <div className="main-content">
                        
                        <div className="header">
                            <h2>Document Management</h2>
                            <div style={{color:'var(--text-muted)'}}>Manage your study resources</div>
                        </div>

                        <div className="content-scroll">
                            
                            {/* UPLOAD FORM */}
                            <div className="upload-card">
                                <h3>📤 Upload New Resource</h3>
                                
                                <div className="form-grid">
                                    <div className="form-group">
                                        <label>Document Name</label>
                                        <input type="text" name="name" className="form-input" placeholder="e.g. Calculus Chapter 1" value={formData.name} onChange={handleInputChange} />
                                    </div>
                                    <div className="form-group">
                                        <label>Subject</label>
                                        <input type="text" name="subject" className="form-input" placeholder="e.g. Mathematics" value={formData.subject} onChange={handleInputChange} />
                                    </div>
                                    <div className="form-group">
                                        <label>Class / Grade</label>
                                        <input type="text" name="docClass" className="form-input" placeholder="e.g. 10th Grade" value={formData.docClass} onChange={handleInputChange} />
                                    </div>
                                    <div className="form-group">
                                        <label>Document Type</label>
                                        <select name="type" className="form-select" value={formData.type} onChange={handleInputChange}>
                                            <option>Notes</option>
                                            <option>Assignment</option>
                                            <option>Question Paper</option>
                                            <option>Lab Record</option>
                                        </select>
                                    </div>
                                    <div className="form-group full">
                                        <label>Description</label>
                                        <textarea name="desc" className="form-textarea" placeholder="Brief details about the file..." value={formData.desc} onChange={handleInputChange}></textarea>
                                    </div>
                                    <div className="form-group full">
                                        <label>Attachment</label>
                                        <div className="file-upload-wrapper">
                                            <input type="file" className="file-input" onChange={handleFileChange} />
                                            <div className="file-label">
                                                {formData.file ? (
                                                    <span style={{color:'var(--success)'}}>Selected: {formData.file.name}</span>
                                                ) : (
                                                    <>Drag files here or <span>Browse</span> to upload</>
                                                )}
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <button className="submit-btn" onClick={handleSubmit}>Upload Document</button>
                            </div>

                            {/* DOCUMENT LIST */}
                            <div className="doc-list-section">
                                <div className="doc-list-header">
                                    <h3>📚 Available Documents</h3>
                                    <span style={{color:'var(--text-muted)', fontSize:'0.9rem'}}>{docs.length} files found</span>
                                </div>

                                {loading ? <p>Loading...</p> : docs.map(doc => (
                                    <div className="doc-card" key={doc._id}>
                                        <div style={{flex: 1}}>
                                            <div style={{display:'flex', justifyContent:'space-between', alignItems:'start'}}>
                                                <div className="doc-info" style={{flex: 1}}>
                                                    <h4>{doc.name}</h4>
                                                    <div className="doc-meta">
                                                        <span className="badge badge-purple">{doc.subject}</span>
                                                        <span className="badge badge-blue">{doc.type}</span>
                                                        <span className="badge badge-gray">{doc.class}</span>
                                                        {doc.description && <span>• {doc.description}</span>}
                                                        <span>• {doc.downloads || 0} downloads</span>
                                                    </div>
                                                </div>
                                                <div className="doc-actions">
                                                    <button className="preview-btn" onClick={() => handlePreview(doc)}>
                                                        👁️ Preview
                                                    </button>
                                                    <button className="download-btn" onClick={() => handleDownload(doc)}>
                                                        ↓ Download
                                                    </button>
                                                    {doc.uploader === localStorage.getItem('userId') && (
                                                        <button className="delete-btn" onClick={() => handleDelete(doc._id, doc.name)} style={{background: '#ef4444'}}>
                                                            🗑️ Delete
                                                        </button>
                                                    )}
                                                </div>
                                            </div>
                                            
                                            <div className="feedback-section">
                                                {!userFeedbackStatus[doc._id] ? (
                                                    <>
                                                        <div className="rating-section">
                                                            <span style={{fontSize:'0.9rem', color:'var(--text-muted)'}}>Rate this document:</span>
                                                            <div className="star-rating">
                                                                {[1,2,3,4,5].map(star => (
                                                                    <span
                                                                        key={star}
                                                                        className={`star ${ratings[doc._id] >= star ? 'filled' : ''}`}
                                                                        onClick={() => handleRating(doc._id, star)}
                                                                    >
                                                                        ★
                                                                    </span>
                                                                ))}
                                                            </div>
                                                        </div>
                                                        
                                                        <div className="feedback-input-group">
                                                            <textarea
                                                                className="feedback-textarea"
                                                                placeholder="Share your feedback (optional)..."
                                                                value={feedbackInput[doc._id] || ''}
                                                                onChange={(e) => handleFeedbackChange(doc._id, e.target.value)}
                                                            />
                                                            <button
                                                                className="feedback-submit"
                                                                onClick={() => submitFeedback(doc._id)}
                                                            >
                                                                Submit
                                                            </button>
                                                        </div>
                                                    </>
                                                ) : (
                                                    <div style={{padding: '10px', background: '#d1fae5', borderRadius: '8px', color: '#065f46', fontWeight: '600', marginBottom: '10px'}}>
                                                        ✓ You have already provided feedback for this document
                                                    </div>
                                                )}
                                                
                                                {feedbacks[doc._id] && feedbacks[doc._id].length > 0 && (
                                                    <div style={{marginTop: '15px'}}>
                                                        <div style={{fontSize: '0.9rem', fontWeight: '600', marginBottom: '10px', color: 'white'}}>📝 Feedbacks ({feedbacks[doc._id].length}):</div>
                                                        <div style={{display: 'flex', flexDirection: 'column', gap: '8px'}}>
                                                            {feedbacks[doc._id].map((fb, idx) => (
                                                                <div key={idx} style={{background: 'rgba(0,0,0,0.2)', padding: '10px 12px', borderRadius: '8px', borderLeft: '3px solid var(--accent)'}}>
                                                                    <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '5px'}}>
                                                                        <span style={{fontWeight: '600', color: 'white'}}>{fb.userName}</span>
                                                                        <span style={{color: '#f59e0b', fontSize: '0.85rem'}}>{'★'.repeat(fb.rating)}</span>
                                                                    </div>
                                                                    {fb.feedback && (
                                                                        <p style={{margin: '5px 0', color: 'var(--text-muted)', fontSize: '0.85rem'}}>{fb.feedback}</p>
                                                                    )}
                                                                    <small style={{color: 'var(--text-muted)', fontSize: '0.75rem'}}>
                                                                        {new Date(fb.createdAt).toLocaleDateString()} {new Date(fb.createdAt).toLocaleTimeString()}
                                                                    </small>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>

                        </div>
                    </div>

                    {/* PREVIEW MODAL */}
                    <div className={`preview-modal ${previewDoc ? 'active' : ''}`} onClick={closePreview}>
                        <div className="preview-container" onClick={(e) => e.stopPropagation()}>
                            <div className="preview-header">
                                <h2 className="preview-title">{previewDoc?.name}</h2>
                                <button className="preview-close-btn" onClick={closePreview}>✕</button>
                            </div>
                            <div className="preview-content">
                                {previewDoc && getPreviewContent(previewDoc)}
                            </div>
                        </div>
                    </div>

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
